name: TEST7. Compile Kernel - BOS Beryllium + KSU-Next Manual Hook + SUSFS (Fixed)

# Perbaikan dari TEST6:
# 1) Bug hook salah sasaran di fs/open.c (dan berpotensi file lain) -- pattern lama
#    mencari anchor generik di SELURUH FILE tanpa memastikan berada di fungsi yang
#    benar. Sekarang pakai DOTALL non-greedy bridging dari signature fungsi yang
#    UNIK sampai anchor penyisipan, supaya dijamin berada di fungsi yang tepat.
# 2) SUSFS ternyata BUKAN native/built-in di driver KSU-Next (dugaan TEST5 salah) --
#    driver ini menulis #include <linux/susfs.h> dan <linux/susfs_def.h> yang HARUS
#    disuplai dari gitlab.com/simonpunk/susfs4ksu, sama seperti pendekatan TEST3/4.

on:
  workflow_dispatch:
    inputs:
      zip_name:
        description: 'Nama Build'
        required: true
        default: 'test-bos-ksunext-manualhook-susfs-fixed'
      kernel_source:
        description: 'Kernel Source'
        required: true
        default: 'https://github.com/baikalos/android_kernel_xiaomi_sdm845.git'
      kernel_branch:
        description: 'Kernel Branch'
        required: true
        default: '13.0'
      defconfig:
        description: 'defconfig path'
        required: true
        default: 'vendor/xiaomi/mi845_defconfig'
      ksu_tag:
        description: 'KernelSU-Next tag/branch dari ThRE-Team'
        required: false
        default: 'v3.3.0-enjoy'
      susfs_branch:
        description: 'SUSFS branch dari simonpunk/susfs4ksu'
        required: false
        default: 'kernel-4.9'
      clang_url:
        description: 'Clang prebuilt'
        required: false
        default: 'https://github.com/tan2ardiansyah/compiler-nub/releases/download/clang-toolchain/clang-r487747c.tar.gz'

jobs:
  test-build:
    name: ${{ github.event.inputs.zip_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc build-essential flex bison ca-certificates clang lld llvm \
            libssl-dev libelf-dev cpio curl git unzip wget patch \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            g++-aarch64-linux-gnu g++-arm-linux-gnueabi \
            binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi \
            libncurses5-dev libncursesw5-dev

      - name: Setup Clang Cache
        id: clang-cache
        uses: actions/cache@v4
        with:
          path: ~/clang-ext
          key: clang-${{ github.event.inputs.clang_url }}

      - name: Setup Clang
        if: steps.clang-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/clang-ext
          curl -Lo clang.tar.gz "${{ github.event.inputs.clang_url }}"
          tar -xzf clang.tar.gz -C ~/clang-ext
          rm -f clang.tar.gz

      - name: Add Clang to PATH
        run: echo "$HOME/clang-ext/bin" >> $GITHUB_PATH

      - name: Clone Kernel Source (BaikalOS)
        run: |
          git clone --depth=1 "${{ github.event.inputs.kernel_source }}" \
            -b "${{ github.event.inputs.kernel_branch }}" kernel-src

      - name: Setup KernelSU-Next (ThRE-Team)
        run: |
          cd kernel-src
          curl -LSs "https://raw.githubusercontent.com/ThRE-Team/KernelSU-Next/main/kernel/setup.sh" \
            | bash -s "${{ github.event.inputs.ksu_tag }}"
          ls -la drivers/kernelsu || echo "TIDAK ADA symlink drivers/kernelsu!"

      - name: Setup SUSFS eksternal (copy file dari gitlab susfs4ksu)
        run: |
          cd kernel-src

          git clone --depth=1 \
            -b "${{ github.event.inputs.susfs_branch }}" \
            "https://gitlab.com/simonpunk/susfs4ksu.git" susfs4ksu-src

          echo "== Struktur kernel_patches/ =="
          ls -la susfs4ksu-src/kernel_patches/
          ls -la susfs4ksu-src/kernel_patches/fs/ 2>/dev/null || echo "(tidak ada subfolder fs/)"
          ls -la susfs4ksu-src/kernel_patches/include/linux/ 2>/dev/null || echo "(tidak ada subfolder include/linux/)"

          # KUNCI FIX (dari investigasi issue #426 KSU-Next): copy file BARU dulu,
          # baru terapkan patch. patch -p1 tidak bisa membuat file baru dari nol.
          echo "== Copy file fs/ =="
          if [ -d "susfs4ksu-src/kernel_patches/fs" ]; then
            cp -v susfs4ksu-src/kernel_patches/fs/* fs/
          else
            echo "[PERINGATAN] kernel_patches/fs/ tidak ditemukan!"
          fi

          echo "== Copy file include/linux/ =="
          if [ -d "susfs4ksu-src/kernel_patches/include/linux" ]; then
            cp -v susfs4ksu-src/kernel_patches/include/linux/* include/linux/
          else
            echo "[PERINGATAN] kernel_patches/include/linux/ tidak ditemukan!"
          fi

          echo "== Verifikasi file kritis =="
          ls -la fs/susfs.c include/linux/susfs.h include/linux/susfs_def.h 2>&1

          # Patch enable SUSFS di dalam folder driver KSU-Next.
          # Folder root di fork ThRE-Team ini bernama "KernelSU-Next" (bukan "KernelSU").
          PATCH1="susfs4ksu-src/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch"
          if [ -f "$PATCH1" ] && [ -d "KernelSU-Next" ]; then
            cp "$PATCH1" KernelSU-Next/
            cd KernelSU-Next
            patch -p1 --forward < 10_enable_susfs_for_ksu.patch \
              && echo "[OK] Patch enable_susfs_for_ksu berhasil." \
              || echo "[PERINGATAN] Patch enable_susfs_for_ksu ada hunk gagal (mungkin sudah include)."
            cd ..
          else
            echo "[INFO] Patch 10_enable_susfs_for_ksu.patch tidak ditemukan atau folder KernelSU-Next tidak ada, skip."
          fi

      - name: Integrasi Manual Hook (fs/exec.c, fs/open.c, fs/read_write.c, fs/stat.c, kernel/reboot.c)
        run: |
          cd kernel-src
          python3 << 'PYEOF'
          import re

          def patch_file(path, patches, label):
              try:
                  with open(path, "r") as f:
                      content = f.read()
              except FileNotFoundError:
                  print(f"[GAGAL] {label}: file {path} tidak ditemukan!")
                  return
              if "ksu_handle" in content:
                  print(f"[INFO] {label}: sepertinya sudah ada hook KSU (skip, idempotent).")
                  return
              total = 0
              for pattern, replacement, desc in patches:
                  new_content, n = re.subn(pattern, replacement, content, count=1, flags=re.DOTALL)
                  if n > 0:
                      content = new_content
                      total += 1
                      print(f"[OK] {label}: {desc}")
                  else:
                      print(f"[PERINGATAN] {label}: pattern untuk '{desc}' tidak ditemukan!")
              with open(path, "w") as f:
                  f.write(content)
              print(f"[{label}] {total}/{len(patches)} patch berhasil.")

          # Semua pattern penyisipan hook sekarang di-"bridge" dari signature fungsi
          # yang UNIK sampai anchor penyisipan dalam SATU match (non-greedy DOTALL),
          # supaya dijamin berada dalam fungsi yang benar -- tidak lagi mencari
          # anchor generik di seluruh file yang berisiko match ke fungsi lain.

          # 1) fs/exec.c -- hook do_execve
          patch_file("fs/exec.c", [
              (r"(int do_execve\(struct filename \*filename,)",
               "#ifdef CONFIG_KSU\n__attribute__((hot))\nextern int ksu_handle_execveat(int *fd, struct filename **filename_ptr,\n\t\t\t\tvoid *argv, void *envp, int *flags);\n#endif\n\n\\1",
               "tambah extern ksu_handle_execveat sebelum do_execve"),
              (r"(int do_execve\(struct filename \*filename,.*?struct user_arg_ptr envp = \{ \.ptr\.native = __envp \};\n)",
               "\\1#ifdef CONFIG_KSU\n\tksu_handle_execveat((int *)AT_FDCWD, &filename, &argv, &envp, 0);\n#endif\n",
               "tambah panggilan hook di do_execve (scoped)"),
          ], "fs/exec.c")

          # 2) fs/open.c -- hook faccessat (FIX: sekarang scoped dari signature ke anchor)
          patch_file("fs/open.c", [
              (r"(SYSCALL_DEFINE3\(faccessat, int, dfd, const char __user \*, filename, int, mode\))",
               "#ifdef CONFIG_KSU\n__attribute__((hot))\nextern int ksu_handle_faccessat(int *dfd, const char __user **filename_user,\n\t\t\t\tint *mode, int *flags);\n#endif\n\n\\1",
               "tambah extern ksu_handle_faccessat sebelum faccessat"),
              (r"(SYSCALL_DEFINE3\(faccessat, int, dfd, const char __user \*, filename, int, mode\)\n\{.*?)(\n\tif \(mode & ~S_IRWXO)",
               "\\1\n#ifdef CONFIG_KSU\n\tksu_handle_faccessat(&dfd, &filename, &mode, NULL);\n#endif\\2",
               "tambah panggilan hook di faccessat (scoped, FIXED)"),
          ], "fs/open.c")

          # 3) fs/read_write.c -- hook sys_read (FIX: sekarang scoped)
          patch_file("fs/read_write.c", [
              (r"(SYSCALL_DEFINE3\(read, unsigned int, fd, char __user \*, buf, size_t, count\))",
               "#ifdef CONFIG_KSU\nextern bool ksu_vfs_read_hook __read_mostly;\nextern __attribute__((cold)) int ksu_handle_sys_read(unsigned int fd,\n\t\t\t\tchar __user **buf_ptr, size_t *count_ptr);\n#endif\n\n\\1",
               "tambah extern ksu_handle_sys_read sebelum sys_read"),
              (r"(SYSCALL_DEFINE3\(read, unsigned int, fd, char __user \*, buf, size_t, count\)\n\{.*?ssize_t ret = -EBADF;\n)",
               "\\1#ifdef CONFIG_KSU\n\tif (unlikely(ksu_vfs_read_hook))\n\t\tksu_handle_sys_read(fd, &buf, &count);\n#endif\n",
               "tambah panggilan hook di sys_read (scoped, FIXED)"),
          ], "fs/read_write.c")

          # 4) fs/stat.c -- hook newfstatat (dibuat scoped juga untuk konsistensi/keamanan)
          patch_file("fs/stat.c", [
              (r"(SYSCALL_DEFINE4\(newfstatat, int, dfd, const char __user \*, filename,)",
               "#ifdef CONFIG_KSU\n__attribute__((hot))\nextern int ksu_handle_stat(int *dfd, const char __user **filename_user,\n\t\t\t\tint *flags);\n#endif\n\n\\1",
               "tambah extern ksu_handle_stat sebelum newfstatat"),
              (r"(SYSCALL_DEFINE4\(newfstatat, int, dfd, const char __user \*, filename,.*?)(\n\terror = vfs_fstatat\(dfd, filename, &stat, flag\);)",
               "\\1\n#ifdef CONFIG_KSU\n\tksu_handle_stat(&dfd, &filename, &flag);\n#endif\\2",
               "tambah panggilan hook di newfstatat (scoped)"),
          ], "fs/stat.c")

          # 5) kernel/reboot.c -- hook reboot (dibuat scoped juga)
          patch_file("kernel/reboot.c", [
              (r"(SYSCALL_DEFINE4\(reboot, int, magic1, int, magic2, unsigned int, cmd,)",
               "#ifdef CONFIG_KSU\nextern int ksu_handle_sys_reboot(int magic1, int magic2, unsigned int cmd, void __user **arg);\n#endif\n\n\\1",
               "tambah extern ksu_handle_sys_reboot sebelum reboot"),
              (r"(SYSCALL_DEFINE4\(reboot, int, magic1, int, magic2, unsigned int, cmd,.*?struct pid_namespace \*pid_ns = task_active_pid_ns\(current\);\n)",
               "\\1#ifdef CONFIG_KSU\n\tksu_handle_sys_reboot(magic1, magic2, cmd, &arg);\n#endif\n",
               "tambah panggilan hook di reboot (scoped)"),
          ], "kernel/reboot.c")
          PYEOF

      - name: Siapkan defconfig (config extract BaikalOS + KSU-Next Manual Hook + SUSFS)
        run: |
          cd kernel-src
          DEFCONFIG_PATH="arch/arm64/configs/${{ github.event.inputs.defconfig }}"

          EXTRACTED_CFG="$GITHUB_WORKSPACE/extracted-config/bos13_defconfig"
          if [ -f "$EXTRACTED_CFG" ]; then
            echo "[INFO] Memakai config extract BaikalOS sebagai basis."
            cp "$EXTRACTED_CFG" "$DEFCONFIG_PATH"
          else
            echo "[PERINGATAN] bos13_defconfig tidak ditemukan."
          fi

          {
            echo "CONFIG_KSU=y"
            echo "CONFIG_KSU_MANUAL_HOOK=y"
            echo "CONFIG_KSU_SUSFS=y"
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y"
            echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y"
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y"
            echo "CONFIG_KSU_SUSFS_SUS_MAP=y"
            echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y"
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y"
            echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y"
            echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y"
            echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y"
            echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y"
          } >> "$DEFCONFIG_PATH"
          echo "[OK] Defconfig dipatch dengan Manual Hook + SUSFS."

      - name: Patch arch/arm64/Makefile (fix clang vdso32)
        run: |
          cd kernel-src
          MAIN_MK="arch/arm64/Makefile"
          cp "$MAIN_MK" "$MAIN_MK.orig"
          sed -i -E \
            's@(CLANG_PREFIX32[[:space:]]*:=[[:space:]]*--prefix=\$\(GCC_TOOLCHAIN32_DIR\))[[:space:]]*$@\1$(notdir $(CROSS_COMPILE_ARM32))@' \
            "$MAIN_MK"
          diff -q "$MAIN_MK" "$MAIN_MK.orig" > /dev/null && echo "[INFO] Tidak ada perubahan." || echo "[OK] Patch vdso32 diterapkan."
          rm -f "$MAIN_MK.orig"

      - name: Skip DTB yang tidak relevan/rusak
        run: |
          cd kernel-src
          DTS_MK="arch/arm64/boot/dts/qcom/Makefile"
          [ ! -f "$DTS_MK" ] && exit 0
          for dtb in "sdm845-v2-qvr-evt.dtb" "sdm845-v2-qvr-dvt.dtb" \
                     "sdm845-interposer-sdm670-mtp.dtb" "sdm845-interposer-sdm670-cdp.dtb"; do
            grep -q "$dtb" "$DTS_MK" && sed -i "/$dtb/d" "$DTS_MK" && echo "[OK] $dtb dihapus."
          done

      - name: Compile Kernel
        env:
          KBUILD_BUILD_USER: "tan"
          KBUILD_BUILD_HOST: "ardiansyah"
        run: |
          cd kernel-src
          OUT_DIR="out"
          export PATH="$HOME/clang-ext/bin:$PATH"

          MAKE_ARGS=(
            O=$OUT_DIR ARCH=arm64
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump
            STRIP=llvm-strip READELF=llvm-readelf
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-
            LLVM=1 LLVM_IAS=1
          )

          mkdir -p $OUT_DIR
          make "${MAKE_ARGS[@]}" ${{ github.event.inputs.defconfig }}
          make "${MAKE_ARGS[@]}" olddefconfig

          echo "== Semua config CONFIG_KSU* yang AKTIF (y) di .config final =="
          grep "^CONFIG_KSU" $OUT_DIR/.config || echo "Tidak ada config CONFIG_KSU* yang aktif!"

          set +e
          make -k -j$(nproc --all) "${MAKE_ARGS[@]}" 2>&1 | tee build.log
          set -e

          IMAGE_OK=0; IMAGE_GZ_DTB_OK=0
          [ -f "$OUT_DIR/arch/arm64/boot/Image" ] && { ls -la "$OUT_DIR/arch/arm64/boot/Image"; IMAGE_OK=1; }
          [ -f "$OUT_DIR/arch/arm64/boot/Image.gz-dtb" ] && { ls -la "$OUT_DIR/arch/arm64/boot/Image.gz-dtb"; IMAGE_GZ_DTB_OK=1; }

          BUILD_OK=0
          [ "$IMAGE_GZ_DTB_OK" -eq 1 ] && { echo "[OK] Image.gz-dtb berhasil!"; BUILD_OK=1; } || \
          [ "$IMAGE_OK" -eq 1 ] && { echo "[SEBAGIAN OK] Image berhasil."; BUILD_OK=1; } || \
          echo "[GAGAL] Build gagal."

          echo "BUILD_OK=$BUILD_OK" >> "$GITHUB_ENV"
          [ "$BUILD_OK" -ne 1 ] && exit 1 || true

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: kernel-src/build.log
          if-no-files-found: warn

      - name: Upload Image.gz-dtb
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.zip_name }}-gz-dtb
          path: kernel-src/out/arch/arm64/boot/Image.gz-dtb
          if-no-files-found: ignore
