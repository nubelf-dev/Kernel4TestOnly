name: 0-compile-kernel-test

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/0-compile-kernel-test.yml"
      - "extracted-config/bos13_defconfig"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      KERNEL_REPO: https://github.com/baikalos/android_kernel_xiaomi_sdm845
      KERNEL_BRANCH: "13.0"
      KERNEL_DIR: kernel
      DEFCONFIG_NAME: bos13_defconfig
      KBUILD_BUILD_USER: "Nerf."
      KBUILD_BUILD_HOST: "OldlineSSS"
      CLANG_VERSION: clang-r487747c
      CLANG_ARCHIVE_URL_MAIN: https://github.com/tan2ardiansyah/compiler-nub/releases/download/clang-toolchain/clang-r487747c.tar.gz
      CLANG_ARCHIVE_URL_MASTER: https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master/clang-r487747c.tar.gz
      GCC64_REPO: https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9
      GCC32_REPO: https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9
      SUSFS_PATCH_URL: https://raw.githubusercontent.com/JackA1ltman/NonGKI_Kernel_Build_2nd/mainline/Patches/Patch/susfs_patch_to_4.9.patch

    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc \
            bison \
            build-essential \
            cpio \
            curl \
            flex \
            git \
            libelf-dev \
            libssl-dev \
            lld \
            python3 \
            rsync \
            unzip \
            xz-utils \
            zip

      - name: Restore toolchain cache
        id: cache-toolchains
        uses: actions/cache@v4
        with:
          path: |
            toolchains/clang-r487747c
            toolchains/gcc64
            toolchains/gcc32
          key: ${{ runner.os }}-toolchains-clang-r487747c-gcc-4.9-v1

      - name: Download clang-r487747c + GCC32/GCC64 (cached)
        run: |
          set -euxo pipefail
          mkdir -p toolchains/clang-r487747c toolchains/gcc64 toolchains/gcc32

          if [ ! -x toolchains/clang-r487747c/bin/clang ]; then
            tmp_tar="/tmp/clang-r487747c.tar.gz"
            if ! curl -fL "${CLANG_ARCHIVE_URL_MAIN}" -o "${tmp_tar}"; then
              curl -fL "${CLANG_ARCHIVE_URL_MASTER}" -o "${tmp_tar}"
            fi
            tar -xzf "${tmp_tar}" -C toolchains/clang-r487747c
          fi

          if [ ! -x toolchains/gcc64/bin/aarch64-linux-android-gcc ]; then
            rm -rf toolchains/gcc64
            git clone --depth=1 "${GCC64_REPO}" toolchains/gcc64
          fi

          if [ ! -x toolchains/gcc32/bin/arm-linux-androideabi-gcc ]; then
            rm -rf toolchains/gcc32
            git clone --depth=1 "${GCC32_REPO}" toolchains/gcc32
          fi

      - name: Clone BaikalOS kernel source
        run: |
          set -euxo pipefail
          git clone --depth=1 --branch "${KERNEL_BRANCH}" "${KERNEL_REPO}" "${KERNEL_DIR}"

      - name: Integrate ReSukiSU + SUSFS patch (with fallback fix)
        working-directory: ${{ env.KERNEL_DIR }}
        run: |
          set -euxo pipefail

          apply_fallback_susfs() {
            echo "Applying compatibility fallback from susfs4ksu kernel-4.9 branch."
            git reset --hard
            git clean -fd

            curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash

            rm -rf /tmp/susfs4ksu
            git clone --depth=1 --branch kernel-4.9 https://github.com/ShirkNeko/susfs4ksu /tmp/susfs4ksu

            cp /tmp/susfs4ksu/kernel_patches/fs/susfs.c fs/
            cp /tmp/susfs4ksu/kernel_patches/include/linux/susfs.h include/linux/

            if [ -f /tmp/susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ]; then
              (cd KernelSU && patch -p1 --forward < /tmp/susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch || true)
            fi

            if [ -f /tmp/susfs4ksu/kernel_patches/50_add_susfs_in_kernel-4.9.patch ]; then
              patch -p1 --forward < /tmp/susfs4ksu/kernel_patches/50_add_susfs_in_kernel-4.9.patch || true
            else
              patch -p1 --forward < /tmp/susfs4ksu/kernel_patches/50_add_susfs_in_kernel.patch || true
            fi
          }

          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash

          curl -fL "${SUSFS_PATCH_URL}" -o /tmp/susfs_patch_to_4.9.patch

          if git apply --check /tmp/susfs_patch_to_4.9.patch; then
            git apply --whitespace=nowarn /tmp/susfs_patch_to_4.9.patch
          else
            echo "Primary susfs_patch_to_4.9.patch failed. Trying relaxed apply."
            patch -p1 --forward --fuzz=3 < /tmp/susfs_patch_to_4.9.patch || true

            if find . -name "*.rej" | grep -q .; then
              apply_fallback_susfs
            fi
          fi

          # Basic guard to ensure susfs files were injected by either primary or fallback flow.
          if [ ! -f include/linux/susfs.h ]; then
            apply_fallback_susfs
          fi

          if find . -name "*.rej" | grep -q .; then
            echo "Patch rejects still exist after fallback flow:"
            find . -name "*.rej" -print
            exit 1
          fi

      - name: Prepare bos13_defconfig
        run: |
          set -euxo pipefail

          if [ ! -f "extracted-config/${DEFCONFIG_NAME}" ]; then
            echo "Missing extracted-config/${DEFCONFIG_NAME}"
            exit 1
          fi

          mkdir -p "${KERNEL_DIR}/arch/arm64/configs/vendor"
          cp "extracted-config/${DEFCONFIG_NAME}" "${KERNEL_DIR}/arch/arm64/configs/${DEFCONFIG_NAME}"
          cp "extracted-config/${DEFCONFIG_NAME}" "${KERNEL_DIR}/arch/arm64/configs/vendor/${DEFCONFIG_NAME}"

          if ! grep -q "^CONFIG_KSU=y" "${KERNEL_DIR}/arch/arm64/configs/${DEFCONFIG_NAME}"; then
            echo "CONFIG_KSU=y" >> "${KERNEL_DIR}/arch/arm64/configs/${DEFCONFIG_NAME}"
          fi
          if ! grep -q "^CONFIG_KSU_SUSFS=y" "${KERNEL_DIR}/arch/arm64/configs/${DEFCONFIG_NAME}"; then
            echo "CONFIG_KSU_SUSFS=y" >> "${KERNEL_DIR}/arch/arm64/configs/${DEFCONFIG_NAME}"
          fi

      - name: Build kernel 4.9.337 (BaikalOS 13.0)
        working-directory: ${{ env.KERNEL_DIR }}
        run: |
          set -euxo pipefail

          export PATH="${GITHUB_WORKSPACE}/toolchains/clang-r487747c/bin:${GITHUB_WORKSPACE}/toolchains/gcc64/bin:${GITHUB_WORKSPACE}/toolchains/gcc32/bin:${PATH}"

          make O=out ARCH=arm64 ${DEFCONFIG_NAME}
          make O=out ARCH=arm64 olddefconfig

          make -j"$(nproc --all)" O=out \
            ARCH=arm64 \
            CC=clang \
            LLVM=1 \
            LLVM_IAS=0 \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            LD=ld.lld

      - name: Collect build outputs
        run: |
          set -euxo pipefail
          mkdir -p artifacts

          cp -v "${KERNEL_DIR}/out/.config" artifacts/config.final || true
          cp -v "${KERNEL_DIR}/out/arch/arm64/boot/Image" artifacts/ || true
          cp -v "${KERNEL_DIR}/out/arch/arm64/boot/Image.gz" artifacts/ || true
          cp -v "${KERNEL_DIR}/out/arch/arm64/boot/Image.gz-dtb" artifacts/ || true
          cp -v "${KERNEL_DIR}/out/arch/arm64/boot/dtbo.img" artifacts/ || true
          find "${KERNEL_DIR}/out/arch/arm64/boot" -maxdepth 2 -type f -name "*.dtb" -exec cp -v {} artifacts/ \; || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: baikalos13-kernel-4.9.337-resukisu-susfs-test
          path: artifacts
          if-no-files-found: error
