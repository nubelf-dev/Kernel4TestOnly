name: Compile Kernel Test

on:
  push:
    branches: [main, master, test]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

env:
  KERNEL_REPO: https://github.com/baikalos/android_kernel_xiaomi_sdm845
  KERNEL_BRANCH: "13.0"
  DEFCONFIG: bos13_defconfig

  CLANG_URL: https://github.com/tan2ardiansyah/compiler-nub/releases/download/clang-toolchain/clang-r487747c.tar.gz
  CLANG_DIR: /opt/clang-r487747c

  GCC64_URL: https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9
  GCC64_DIR: /opt/aarch64-linux-android-4.9

  GCC32_URL: https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9
  GCC32_DIR: /opt/arm-linux-androideabi-4.9

  SUSFS_PATCH_URL: https://github.com/JackA1ltman/NonGKI_Kernel_Build_2nd/raw/mainline/Patches/Patch/susfs_patch_to_4.9.patch

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo dpkg --add-architecture i386 || true
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bc bison flex libssl-dev libelf-dev \
            python3 python3-pip git curl wget zip unzip ccache \
            device-tree-compiler libncurses5-dev libncursesw5-dev \
            libncurses-dev libgmp-dev libmpc-dev libmpfr-dev \
            libtinfo5 libtinfo-dev zstd lz4 rsync pkg-config \
            gcc-multilib g++-multilib libzstd-dev liblz4-dev
          ccache -M 5G

      # ---------- Clang ----------
      - name: Cache Clang
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ env.CLANG_DIR }}
          key: clang-r487747c-${{ runner.os }}
          restore-keys: clang-r487747c-

      - name: Download & extract Clang
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          sudo mkdir -p ${{ env.CLANG_DIR }}
          curl -L ${{ env.CLANG_URL }} -o /tmp/clang-r487747c.tar.gz
          sudo tar -xzf /tmp/clang-r487747c.tar.gz -C ${{ env.CLANG_DIR }}
          if [ ! -x "${{ env.CLANG_DIR }}/bin/clang" ]; then
            echo "::error::clang binary not found in ${{ env.CLANG_DIR }}/bin"
            find ${{ env.CLANG_DIR }} -maxdepth 3 -type f -name clang || true
            exit 1
          fi

      # ---------- GCC64 ----------
      - name: Cache GCC64
        id: cache-gcc64
        uses: actions/cache@v4
        with:
          path: ${{ env.GCC64_DIR }}
          key: gcc64-master-${{ runner.os }}
          restore-keys: gcc64-

      - name: Download GCC64
        if: steps.cache-gcc64.outputs.cache-hit != 'true'
        run: |
          sudo git clone --depth=1 -b master ${{ env.GCC64_URL }} ${{ env.GCC64_DIR }}

      # ---------- GCC32 ----------
      - name: Cache GCC32
        id: cache-gcc32
        uses: actions/cache@v4
        with:
          path: ${{ env.GCC32_DIR }}
          key: gcc32-master-${{ runner.os }}
          restore-keys: gcc32-

      - name: Download GCC32
        if: steps.cache-gcc32.outputs.cache-hit != 'true'
        run: |
          sudo git clone --depth=1 -b master ${{ env.GCC32_URL }} ${{ env.GCC32_DIR }}

      # ---------- ccache ----------
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: /tmp/ccache
          key: ccache-kernel-test-${{ github.run_id }}
          restore-keys: ccache-kernel-test-

      # ---------- Kernel source ----------
      # Full/partial clone so git apply --3way has the blobs it needs.
      - name: Clone BaikalOS kernel source
        run: |
          git clone --filter=blob:none -b ${{ env.KERNEL_BRANCH }} ${{ env.KERNEL_REPO }} kernel

      # ---------- BaikalOS baikalfs cleanup ----------
      # The generic SUSFS patch conflicts with BaikalOS's baikalfs hooks in a
      # few files. Remove those hooks first so SUSFS can apply cleanly.
      - name: Remove baikalfs hooks from conflicting files
        working-directory: kernel
        run: |
          python3 << 'PYEOF'
          import re

          # fs/stat.c
          with open('fs/stat.c', 'r') as f:
              s = f.read()
          s = re.sub(r'\n#include "baikalfs.h"\n', '\n', s)
          s = re.sub(
              r'\tif\( filter_out_path\("vfs_getattr", path\) \) \{\n\t\treturn -ENOENT;\n\t\}\n',
              '', s)
          s = s.replace('stat->blksize = i_blocksize(inode);', 'stat->blksize = (1 << inode->i_blkbits);')
          with open('fs/stat.c', 'w') as f:
              f.write(s)

          # fs/proc_namespace.c
          with open('fs/proc_namespace.c', 'r') as f:
              s = f.read()
          s = re.sub(r'\n#include "baikalfs.h"\n', '\n', s)
          for fn in ('show_vfsmnt', 'show_mountinfo', 'show_vfsstat'):
              s = re.sub(
                  rf'\tif\( filter_out_mount\("{fn}", mnt, &p->root\) \) \{{\n\t\terr = SEQ_SKIP;\n\t\tgoto out;\n\t\}}\n',
                  '', s)
          with open('fs/proc_namespace.c', 'w') as f:
              f.write(s)

          # fs/proc/task_mmu.c
          with open('fs/proc/task_mmu.c', 'r') as f:
              s = f.read()
          s = re.sub(r'\n#include "../baikalfs.h"\n', '\n', s)
          s = re.sub(
              r'''\tif \(file\) \{\n\t\tif\( !filter_out_path_vma\( "show_map_vma", &file->f_path\) \) \{\n\t\t\tseq_pad\(m, ' '\);\n\t\t\tseq_file_path\(m, file, "\\n"\);\n\t\t\tgoto done;\n\t\t\} else \{\n\t\t\tname = "\[naik\]";\n\t\t\tgoto done;\n\t\t\}\n\t\}\n''',
              '''\tif (file) {\n\t\tseq_pad(m, ' ');\n\t\tseq_file_path(m, file, "\\n");\n\t\tgoto done;\n\t}\n''', s)
          with open('fs/proc/task_mmu.c', 'w') as f:
              f.write(s)
          PYEOF

      # ---------- SUSFS patch ----------
      # Apply SUSFS *before* ReSukiSU so a failure can be retried on a clean tree.
      - name: Apply SUSFS 2.2.0 patch
        working-directory: kernel
        run: |
          curl -L "${{ env.SUSFS_PATCH_URL }}" -o /tmp/susfs.patch
          echo "::group::SUSFS patch dry-run"
          if patch -p1 --dry-run --no-backup-if-mismatch < /tmp/susfs.patch; then
            echo "::endgroup::"
            echo "Applying SUSFS patch cleanly..."
            patch -p1 --no-backup-if-mismatch < /tmp/susfs.patch
          else
            echo "::endgroup::"
            echo "::warning::SUSFS patch dry-run failed, attempting 3-way merge..."
            if git apply --3way /tmp/susfs.patch; then
              echo "SUSFS patch applied via 3-way merge."
            else
              echo "::warning::3-way merge failed, resetting changed files and attempting fuzz apply..."
              git checkout -- .
              patch -p1 --fuzz=3 --no-backup-if-mismatch < /tmp/susfs.patch || true
              if find . -type f \( -name "*.rej" -o -name "*.orig" \) | grep -q .; then
                echo "::error::SUSFS patch has unresolved rejects. Inspect the files below:"
                find . -type f \( -name "*.rej" -o -name "*.orig" \)
                exit 1
              fi
              echo "SUSFS patch applied with fuzz."
            fi
          fi
          find . -type f -name "*.orig" -delete

      # ---------- ReSukiSU ----------
      - name: Integrate ReSukiSU
        working-directory: kernel
        run: |
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash

      - name: Disable KernelSU kprobe hooks (manual hook mode)
        working-directory: kernel/KernelSU
        run: |
          find kernel -type f \( -name "*.c" -o -name "*.h" \) -exec \
            sed -i 's/^#ifdef CONFIG_KPROBES/#if defined(CONFIG_KPROBES) \&\& 0/g' {} +

      # ---------- Defconfig ----------
      - name: Copy extracted defconfig
        run: |
          mkdir -p kernel/arch/arm64/configs
          cp extracted-config/${{ env.DEFCONFIG }} kernel/arch/arm64/configs/${{ env.DEFCONFIG }}

      # ---------- Build ----------
      - name: Compile kernel
        working-directory: kernel
        env:
          ARCH: arm64
          SUBARCH: arm64
          KBUILD_BUILD_USER: "Nerf."
          KBUILD_BUILD_HOST: "OldlineSSS"
          CCACHE_DIR: /tmp/ccache
          CROSS_COMPILE: aarch64-linux-android-
          CROSS_COMPILE_ARM32: arm-linux-androideabi-
          CLANG_TRIPLE: aarch64-linux-gnu-
        run: |
          set -e
          export PATH="${{ env.CLANG_DIR }}/bin:${{ env.GCC64_DIR }}/bin:${{ env.GCC32_DIR }}/bin:$PATH"

          make -j$(nproc) O=out ARCH=arm64 \
            CC="ccache clang" LD=ld.lld \
            CLANG_TRIPLE=$CLANG_TRIPLE \
            CROSS_COMPILE=$CROSS_COMPILE \
            CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 \
            ${{ env.DEFCONFIG }}

          # Enable ReSukiSU + SUSFS
          ./scripts/config --file out/.config -e KSU
          ./scripts/config --file out/.config -e KSU_MANUAL_HOOK
          ./scripts/config --file out/.config -e KSU_SUSFS
          ./scripts/config --file out/.config -e KSU_SUSFS_SUS_PATH
          ./scripts/config --file out/.config -e KSU_SUSFS_SUS_MOUNT
          ./scripts/config --file out/.config -e KSU_SUSFS_SUS_KSTAT
          ./scripts/config --file out/.config -e KSU_SUSFS_SPOOF_UNAME
          ./scripts/config --file out/.config -e KSU_SUSFS_ENABLE_LOG
          ./scripts/config --file out/.config -e KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS
          ./scripts/config --file out/.config -e KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG
          ./scripts/config --file out/.config -e KSU_SUSFS_OPEN_REDIRECT
          ./scripts/config --file out/.config -e KSU_SUSFS_SUS_MAP

          # Non-GKI manual hook works safest without kprobes
          ./scripts/config --file out/.config -d KPROBES || true
          ./scripts/config --file out/.config -d KPROBE_EVENTS || true
          ./scripts/config --file out/.config -d HAVE_KPROBES || true

          make -j$(nproc) O=out ARCH=arm64 \
            CC="ccache clang" LD=ld.lld \
            CLANG_TRIPLE=$CLANG_TRIPLE \
            CROSS_COMPILE=$CROSS_COMPILE \
            CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 \
            olddefconfig

          echo "::group::ReSukiSU/SUSFS config verification"
          grep -q "^CONFIG_KSU=y" out/.config
          grep -q "^CONFIG_KSU_MANUAL_HOOK=y" out/.config
          grep -q "^CONFIG_KSU_SUSFS=y" out/.config
          echo "All required KSU/SUSFS configs are enabled."
          echo "::endgroup::"

          make -j$(nproc) O=out ARCH=arm64 \
            CC="ccache clang" LD=ld.lld \
            CLANG_TRIPLE=$CLANG_TRIPLE \
            CROSS_COMPILE=$CROSS_COMPILE \
            CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 2>&1 | tee ../kernel-build.log

      - name: Verify kernel image
        working-directory: kernel
        run: |
          if [ ! -f "out/arch/arm64/boot/Image.gz-dtb" ]; then
            echo "::error::Image.gz-dtb not found!"
            ls -la out/arch/arm64/boot/ || true
            exit 1
          fi
          echo "Kernel image: $(ls -lh out/arch/arm64/boot/Image.gz-dtb)"

      - name: Upload kernel build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-build-test
          if-no-files-found: ignore
          path: |
            kernel/out/arch/arm64/boot/Image.gz-dtb
            kernel/out/arch/arm64/boot/Image.gz
            kernel/out/arch/arm64/boot/Image
            kernel/out/vmlinux
            kernel/out/System.map
            kernel/out/.config
            kernel-build.log

      - name: Trigger flashable zip workflow
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-flashable-zip-test.yml',
              ref: context.ref,
            });
