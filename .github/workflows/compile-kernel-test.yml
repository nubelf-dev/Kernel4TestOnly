###############################################################################
#  compile-kernel-test.yml
#  Compile BaikalOS 13.0 kernel 4.9.337 sdm845 + ReSukiSU + SUSFS 2.2.0
###############################################################################

name: Compile Kernel (Test)

on:
  workflow_dispatch:
    inputs:
      resukisu_branch:
        description: "ReSukiSU branch / tag"
        required: false
        default: "main"
      susfs_patch_url:
        description: "URL patch SUSFS 2.2.0 untuk kernel 4.9"
        required: false
        default: "https://raw.githubusercontent.com/JackA1ltman/NonGKI_Kernel_Build_2nd/mainline/Patches/Patch/susfs_patch_to_4.9.patch"

env:
  KERNEL_REPO: https://github.com/baikalos/android_kernel_xiaomi_sdm845
  KERNEL_BRANCH: "13.0"
  KERNEL_DIR: android_kernel_xiaomi_sdm845
  DEFCONFIG_NAME: bos13_defconfig
  KBUILD_BUILD_USER: "Nerf."
  KBUILD_BUILD_HOST: "OldlineSSS"
  CLANG_VERSION: clang-r487747c
  CLANG_URL: "https://github.com/tan2ardiansyah/compiler-nub/releases/download/clang-toolchain/clang-r487747c.tar.gz"
  GCC64_REPO: https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9
  GCC32_REPO: https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9
  GCC_BRANCH: android-11.0.0_r48
  RESUKISU_REPO: https://github.com/ReSukiSU/ReSukiSU

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ccache curl flex \
            git gnupg gperf imagemagick lib32readline-dev \
            lib32z1-dev libelf-dev liblz4-tool libncurses5-dev \
            libsdl1.2-dev libssl-dev libxml2 libxml2-utils \
            lzop pngcrush rsync schedtool squashfs-tools \
            xsltproc zip zlib1g-dev python3 python-is-python3 \
            cpio kmod

      - name: Cache Clang
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: toolchain/clang
          key: clang-${{ env.CLANG_VERSION }}-v1

      - name: "Download Clang if cache miss"
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p toolchain/clang
          echo "[INFO] Downloading ${{ env.CLANG_VERSION }}..."
          curl -fsSL "${{ env.CLANG_URL }}" -o clang.tar.gz
          tar -xzf clang.tar.gz -C toolchain/clang
          rm -f clang.tar.gz
          echo "[OK] Clang downloaded"
          toolchain/clang/bin/clang --version || true

      - name: "Cache GCC64 aarch64"
        id: cache-gcc64
        uses: actions/cache@v4
        with:
          path: toolchain/gcc64
          key: gcc64-aarch64-4.9-${{ env.GCC_BRANCH }}-v1

      - name: "Download GCC64 if cache miss"
        if: steps.cache-gcc64.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 -b ${{ env.GCC_BRANCH }} \
            ${{ env.GCC64_REPO }} toolchain/gcc64
          echo "[OK] GCC64 downloaded"

      - name: "Cache GCC32 arm"
        id: cache-gcc32
        uses: actions/cache@v4
        with:
          path: toolchain/gcc32
          key: gcc32-arm-4.9-${{ env.GCC_BRANCH }}-v1

      - name: "Download GCC32 if cache miss"
        if: steps.cache-gcc32.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 -b ${{ env.GCC_BRANCH }} \
            ${{ env.GCC32_REPO }} toolchain/gcc32
          echo "[OK] GCC32 downloaded"

      - name: Clone BaikalOS kernel source
        run: |
          git clone --depth=1 -b ${{ env.KERNEL_BRANCH }} \
            ${{ env.KERNEL_REPO }} ${{ env.KERNEL_DIR }}
          cd ${{ env.KERNEL_DIR }}
          echo "[INFO] Kernel version: $(make kernelversion)"
          echo "[INFO] HEAD: $(git log --oneline -1)"

      - name: Integrate ReSukiSU
        run: |
          cd ${{ env.KERNEL_DIR }}
          echo "[INFO] Running ReSukiSU setup.sh..."
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/${{ github.event.inputs.resukisu_branch || 'main' }}/kernel/setup.sh" | bash
          echo "[OK] ReSukiSU integrated"
          ls -la KernelSU/ || ls -la drivers/kernelsu/ || echo "[WARN] KernelSU dir check"

      # ============================================================
      # STEP Generate ksu_hook.h dari signature ASLI (7 hooks)
      # ============================================================
      - name: Generate ksu_hook.h (7 hooks - signature ASLI)
        run: |
          cd ${{ env.KERNEL_DIR }}

          python3 << 'PYEOF'
          import re
          from pathlib import Path

          ksu_dirs = ['KernelSU', 'KernelSU-Next', 'ReSukiSU']
          ksu_dir = next((d for d in ksu_dirs if Path(d).exists()), None)
          if not ksu_dir:
              print("[FAIL] KSU source dir not found")
              exit(1)

          signatures = {}
          for pattern in ['*.c', '*.h']:
              for f in Path(ksu_dir).rglob(pattern):
                  try:
                      text = f.read_text(errors='replace')
                  except:
                      continue
                  for m in re.finditer(
                      r'\b(?:int|void)\s+(ksu_handle_\w+)\s*\(([^)]*)\)\s*[;{]',
                      text, re.MULTILINE
                  ):
                      name = m.group(1)
                      params = m.group(2).strip()
                      full_match = m.group(0)
                      rettype = 'int' if full_match.strip().startswith('int') else 'void'
                      if name == 'ksu_handle_stat':
                          if 'const char __user' in params:
                              signatures[name] = (rettype, params)
                          elif name not in signatures:
                              signatures[name] = (rettype, params)
                      else:
                          if name not in signatures or '{' in text[m.end()-1:m.end()]:
                              signatures[name] = (rettype, params)

          # 7 hook WAJIB yang harus di-inject di kernel source
          wajib_hooks = {
              'ksu_handle_execveat',
              'ksu_handle_faccessat',
              'ksu_handle_stat',
              'ksu_handle_sys_read',
              'ksu_handle_setresuid',
              'ksu_handle_sys_reboot',
              'ksu_handle_input_handle_event',
          }

          print(f"Total extracted: {len(signatures)}")
          print()

          header = [
              '/* Auto-generated ksu_hook.h - 7 hook wajib (signature ASLI) */',
              '#ifndef __KSU_HOOK_H',
              '#define __KSU_HOOK_H',
              '',
              '#include <linux/types.h>',
              '#include <linux/uidgid.h>',
              '',
              'struct file;',
              'struct filename;',
              '',
          ]

          for name in sorted(wajib_hooks):
              if name in signatures:
                  rettype, params = signatures[name]
                  header.append(f'extern {rettype} {name}({params});')
                  print(f"  ✓ {rettype} {name}({params})")
              else:
                  print(f"  ⚠ Missing in source: {name}")

          header.append('')
          header.append('#endif')

          Path('include/linux/ksu_hook.h').write_text('\n'.join(header))
          print()
          print("== Contents ==")
          print(Path('include/linux/ksu_hook.h').read_text())
          PYEOF

      - name: Apply SUSFS patch
        run: |
          cd ${{ env.KERNEL_DIR }}
          SUSFS_PATCH_URL="${{ github.event.inputs.susfs_patch_url || 'https://raw.githubusercontent.com/JackA1ltman/NonGKI_Kernel_Build_2nd/mainline/Patches/Patch/susfs_patch_to_4.9.patch' }}"

          echo "[INFO] Downloading SUSFS patch..."
          curl -fsSL "$SUSFS_PATCH_URL" -o susfs_patch_to_4.9.patch

          echo "[INFO] Applying SUSFS patch..."
          git apply --reject --whitespace=fix susfs_patch_to_4.9.patch || true

          echo ""
          echo "[CHK] Checking for reject files..."
          REJECTS=$(find . -name "*.rej" 2>/dev/null)
          if [ -n "$REJECTS" ]; then
            echo "[WARN] Found reject files:"
            echo "$REJECTS"
            for rej in $REJECTS; do
              echo "================================================"
              echo "[FILE] $rej"
              echo "================================================"
              cat "$rej"
              echo ""
            done
          else
            echo "[OK] No reject files"
          fi

      - name: "Manual fix fs stat c SUSFS sus_kstat"
        run: |
          cd ${{ env.KERNEL_DIR }}
          FILE="fs/stat.c"

          if [ ! -f "${FILE}.rej" ]; then
            echo "[OK] ${FILE}.rej not found - no fix needed"
            exit 0
          fi

          echo "[FIX] Applying manual fix for ${FILE}..."

          python3 <<'PYEOF'
          import re

          with open("fs/stat.c", "r") as f:
              content = f.read()

          if '#include <linux/susfs.h>' not in content:
              if '#include "baikalfs.h"' in content:
                  content = content.replace(
                      '#include "baikalfs.h"',
                      '#include "baikalfs.h"\n'
                      '#ifdef CONFIG_KSU_SUSFS_SUS_KSTAT\n'
                      '#include <linux/susfs.h>\n'
                      '#endif'
                  )
                  print("  [OK] Added SUSFS include")

          if 'susfs_sus_kstat' not in content:
              old_block = (
                  "int vfs_getattr_nosec(struct path *path, struct kstat *stat)\n"
                  "{\n"
                  "\tstruct inode *inode = d_backing_inode(path->dentry);\n"
                  "\n"
                  "\tif (inode->i_op->getattr)\n"
                  "\t\treturn inode->i_op->getattr(path->mnt, path->dentry, stat);\n"
                  "\n"
                  "\tgeneric_fillattr(inode, stat);\n"
                  "\treturn 0;\n"
                  "}"
              )
              new_block = (
                  "int vfs_getattr_nosec(struct path *path, struct kstat *stat)\n"
                  "{\n"
                  "\tstruct inode *inode = d_backing_inode(path->dentry);\n"
                  "\n"
                  "\tif (inode->i_op->getattr)\n"
                  "\t\treturn inode->i_op->getattr(path->mnt, path->dentry, stat);\n"
                  "\n"
                  "\tgeneric_fillattr(inode, stat);\n"
                  "#ifdef CONFIG_KSU_SUSFS_SUS_KSTAT\n"
                  "\tsusfs_sus_kstat(inode, stat);\n"
                  "#endif\n"
                  "\treturn 0;\n"
                  "}"
              )
              if old_block in content:
                  content = content.replace(old_block, new_block)
                  print("  [OK] Added susfs_sus_kstat() to vfs_getattr_nosec")
              else:
                  pattern = r'(generic_fillattr\(inode, stat\);)\s*\n(\s*return 0;\s*\n\}\s*\nEXPORT_SYMBOL\(vfs_getattr_nosec\))'
                  replacement = r'\1' + '\n#ifdef CONFIG_KSU_SUSFS_SUS_KSTAT\n\tsusfs_sus_kstat(inode, stat);\n#endif\n' + r'\2'
                  new_content = re.sub(pattern, replacement, content, count=1)
                  if new_content != content:
                      content = new_content
                      print("  [OK] Added susfs_sus_kstat() via regex")
                  else:
                      lines = content.split('\n')
                      new_lines = []
                      in_func = False
                      done = False
                      for line in lines:
                          if 'vfs_getattr_nosec' in line and 'int ' in line:
                              in_func = True
                          if in_func and not done and 'generic_fillattr(inode, stat)' in line:
                              new_lines.append(line)
                              new_lines.append('#ifdef CONFIG_KSU_SUSFS_SUS_KSTAT')
                              new_lines.append('\tsusfs_sus_kstat(inode, stat);')
                              new_lines.append('#endif')
                              done = True
                              continue
                          new_lines.append(line)
                      if done:
                          content = '\n'.join(new_lines)
                          print("  [OK] Added susfs_sus_kstat() line-by-line")
                      else:
                          print("  [FAIL] Could not patch vfs_getattr_nosec")

          with open("fs/stat.c", "w") as f:
              f.write(content)
          PYEOF

          rm -f "${FILE}.rej"
          echo "[OK] ${FILE} fixed"

      - name: "Manual fix fs proc_namespace c SUSFS sus_mount"
        run: |
          cd ${{ env.KERNEL_DIR }}
          FILE="fs/proc_namespace.c"

          if [ ! -f "${FILE}.rej" ]; then
            echo "[OK] ${FILE}.rej not found - no fix needed"
            exit 0
          fi

          echo "[FIX] Applying manual fix for ${FILE}..."

          python3 <<'PYEOF'
          import re

          with open("fs/proc_namespace.c", "r") as f:
              content = f.read()

          changes = 0

          if '#include <linux/susfs.h>' not in content:
              if '#include "baikalfs.h"' in content:
                  content = content.replace(
                      '#include "baikalfs.h"',
                      '#include "baikalfs.h"\n'
                      '#ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\n'
                      '#include <linux/susfs.h>\n'
                      '#endif'
                  )
              else:
                  content = content.replace(
                      '#include "internal.h"',
                      '#include "internal.h"\n'
                      '#ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\n'
                      '#include <linux/susfs.h>\n'
                      '#endif'
                  )
              changes += 1
              print("  [OK] Added SUSFS include")

          if 'susfs_is_sus_mount' not in content:
              insert_point = '#ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\n#include <linux/susfs.h>\n#endif'
              if insert_point in content:
                  content = content.replace(
                      insert_point,
                      insert_point + '\n\n'
                      '#ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\n'
                      'extern bool susfs_is_sus_mount(struct vfsmount *mnt);\n'
                      'extern int susfs_get_non_sus_mnt_id_from_mnt(struct mount *mnt);\n'
                      '#endif'
                  )
              changes += 1
              print("  [OK] Added SUSFS extern declarations")

          if 'susfs_is_sus_mount' not in content and 'show_vfsmnt' in content:
              content_fixed = content.replace(
                  'static int show_vfsmnt(struct seq_file *m, struct vfsmount *mnt)\n{',
                  'static int show_vfsmnt(struct seq_file *m, struct vfsmount *mnt)\n{\n'
                  '#ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\n'
                  '\tif (susfs_is_sus_mount(mnt))\n'
                  '\t\treturn SEQ_SKIP;\n'
                  '#endif',
                  1
              )
              if content_fixed != content:
                  content = content_fixed
                  changes += 1
                  print("  [OK] Added SUSFS check to show_vfsmnt")

          if 'show_mountinfo' in content and content.count('susfs_is_sus_mount') < 2:
              pattern_mountinfo = r'(static int show_mountinfo\(struct seq_file \*m, struct vfsmount \*mnt\)\s*\{)'
              match = re.search(pattern_mountinfo, content)
              if match:
                  old = match.group(0)
                  content = content.replace(old, old + '\n'
                      '#ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\n'
                      '\tif (susfs_is_sus_mount(mnt))\n'
                      '\t\treturn SEQ_SKIP;\n'
                      '#endif', 1)
                  changes += 1
                  print("  [OK] Added SUSFS check to show_mountinfo")

              if 'susfs_get_non_sus_mnt_id_from_mnt' not in content:
                  old_seq = 'seq_printf(m, "%i %i %u:%u ", r->mnt_id, r->mnt_parent->mnt_id,'
                  if old_seq in content:
                      new_seq = (
                          '#ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\n'
                          '\tseq_printf(m, "%i %i %u:%u ",\n'
                          '\t\tsusfs_get_non_sus_mnt_id_from_mnt(r),\n'
                          '\t\tsusfs_get_non_sus_mnt_id_from_mnt(r->mnt_parent),\n'
                          '#else\n'
                          '\tseq_printf(m, "%i %i %u:%u ", r->mnt_id, r->mnt_parent->mnt_id,\n'
                          '#endif'
                      )
                      content = content.replace(old_seq, new_seq, 1)
                      changes += 1
                      print("  [OK] Added mnt_id spoofing")

          if 'show_vfsstat' in content and content.count('susfs_is_sus_mount') < 3:
              pattern_vfsstat = r'(static int show_vfsstat\(struct seq_file \*m, struct vfsmount \*mnt\)\s*\{)'
              match = re.search(pattern_vfsstat, content)
              if match:
                  old = match.group(0)
                  content = content.replace(old, old + '\n'
                      '#ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\n'
                      '\tif (susfs_is_sus_mount(mnt))\n'
                      '\t\treturn SEQ_SKIP;\n'
                      '#endif', 1)
                  changes += 1
                  print("  [OK] Added SUSFS check to show_vfsstat")

          with open("fs/proc_namespace.c", "w") as f:
              f.write(content)

          print("")
          print("  Total changes: " + str(changes))
          PYEOF

          rm -f "${FILE}.rej"
          echo "[OK] ${FILE} fixed"

      - name: "Manual fix fs proc task_mmu c SUSFS sus_map"
        run: |
          cd ${{ env.KERNEL_DIR }}
          FILE="fs/proc/task_mmu.c"

          if [ ! -f "${FILE}.rej" ]; then
            echo "[OK] ${FILE}.rej not found - no fix needed"
            exit 0
          fi

          echo "[FIX] Applying manual fix for ${FILE}..."

          python3 <<'PYEOF'
          import re

          with open("fs/proc/task_mmu.c", "r") as f:
              content = f.read()

          changes = 0

          if '#include <linux/susfs.h>' not in content:
              if '#include "../baikalfs.h"' in content:
                  content = content.replace(
                      '#include "../baikalfs.h"',
                      '#include "../baikalfs.h"\n'
                      '#ifdef CONFIG_KSU_SUSFS_SUS_MAP\n'
                      '#include <linux/susfs.h>\n'
                      '#endif'
                  )
              else:
                  content = content.replace(
                      '#include "internal.h"',
                      '#include "internal.h"\n'
                      '#ifdef CONFIG_KSU_SUSFS_SUS_MAP\n'
                      '#include <linux/susfs.h>\n'
                      '#endif'
                  )
              changes += 1
              print("  [OK] Added SUSFS include")

          if 'SUSFS_IS_INODE_SUS_MAP' not in content and 'show_map_vma' in content:
              old_func = 'static void show_map_vma(struct seq_file *m, struct vm_area_struct *vma, int is_pid)\n{'
              if old_func in content:
                  new_func = (
                      'static void show_map_vma(struct seq_file *m, struct vm_area_struct *vma, int is_pid)\n{\n'
                      '#ifdef CONFIG_KSU_SUSFS_SUS_MAP\n'
                      '\tif (vma->vm_file && SUSFS_IS_INODE_SUS_MAP(file_inode(vma->vm_file)))\n'
                      '\t\treturn;\n'
                      '#endif'
                  )
                  content = content.replace(old_func, new_func, 1)
                  changes += 1
                  print("  [OK] Added SUSFS check to show_map_vma")

          if 'SUSFS_IS_INODE_SUS_MAP' not in content or content.count('SUSFS_IS_INODE_SUS_MAP') < 2:
              old_show_smap = 'static int show_smap(struct seq_file *m, void *v, int is_pid)\n{'
              if old_show_smap in content:
                  new_show_smap = (
                      'static int show_smap(struct seq_file *m, void *v, int is_pid)\n{\n'
                      '#ifdef CONFIG_KSU_SUSFS_SUS_MAP\n'
                      '\t{\n'
                      '\t\tstruct vm_area_struct *check_vma = v;\n'
                      '\t\tif (check_vma->vm_file && SUSFS_IS_INODE_SUS_MAP(file_inode(check_vma->vm_file)))\n'
                      '\t\t\treturn SEQ_SKIP;\n'
                      '\t}\n'
                      '#endif'
                  )
                  content = content.replace(old_show_smap, new_show_smap, 1)
                  changes += 1
                  print("  [OK] Added SUSFS check to show_smap")

          with open("fs/proc/task_mmu.c", "w") as f:
              f.write(content)

          print("")
          print("  Total changes: " + str(changes))
          PYEOF

          rm -f "${FILE}.rej"
          echo "[OK] ${FILE} fixed"

      # ============================================================
      # STEP Inject 7 hook WAJIB dengan signature ASLI
      # ============================================================
      - name: Apply 7 hook WAJIB (signature ASLI dari source)
        run: |
          cd ${{ env.KERNEL_DIR }}

          inject_hook() {
            local file="$1"
            local func_pat="$2"
            local hook_line="$3"
            [ -f "$file" ] || return 1
            awk -v pat="$func_pat" -v hook="$hook_line" '
              $0 ~ pat { in_func=1 }
              in_func && /^\{/ && !done {
                print
                print "\t/* ReSukiSU hook */"
                print "\t" hook
                done=1; in_func=0; next
              }
              { print }
            ' "$file" > "$file.tmp" && mv "$file.tmp" "$file"
          }

          add_include() {
            local file="$1"
            [ -f "$file" ] || return
            if ! grep -q "linux/ksu_hook.h" "$file"; then
              sed -i '0,/^#include/s||#include <linux/ksu_hook.h>\n&|' "$file"
            fi
          }

          # 1. execveat
          # signature: int ksu_handle_execveat(int *fd, struct filename **filename_ptr,
          #                                    void *argv, void *envp, int *flags)
          add_include fs/exec.c
          if ! grep -q "ksu_handle_execveat" fs/exec.c; then
            inject_hook fs/exec.c "static int do_execveat_common" \
              "ksu_handle_execveat(&fd, &filename, &argv, &envp, &flags);"
            if ! grep -q "ksu_handle_execveat" fs/exec.c; then
              inject_hook fs/exec.c "int do_execveat_common" \
                "ksu_handle_execveat(&fd, &filename, &argv, &envp, &flags);"
            fi
          fi

          # 2. faccessat
          # signature: int ksu_handle_faccessat(int *dfd, const char __user **filename_user,
          #                                     int *mode, int *__unused_flags)
          add_include fs/open.c
          if ! grep -q "ksu_handle_faccessat" fs/open.c; then
            inject_hook fs/open.c "SYSCALL_DEFINE3.faccessat" \
              "ksu_handle_faccessat(&dfd, &filename, &mode, NULL);"
          fi

          # 3. stat
          # signature: int ksu_handle_stat(int *dfd, const char __user **filename_user, int *flags)
          # Note: kernel 4.9 pakai 'flag' (singular), bukan 'flags'
          add_include fs/stat.c
          if ! grep -q "ksu_handle_stat" fs/stat.c; then
            inject_hook fs/stat.c "SYSCALL_DEFINE4.newfstatat" \
              "ksu_handle_stat(&dfd, &filename, &flag);"
          fi

          # 4. sys_read
          # signature: int ksu_handle_sys_read(unsigned int fd, char __user **buf_ptr,
          #                                    size_t *count_ptr)
          add_include fs/read_write.c
          if ! grep -q "ksu_handle_sys_read" fs/read_write.c; then
            inject_hook fs/read_write.c "SYSCALL_DEFINE3.read" \
              "ksu_handle_sys_read(fd, &buf, &count);"
          fi

          # 5. setresuid
          # signature: int ksu_handle_setresuid(uid_t ruid, uid_t euid, uid_t suid)
          add_include kernel/sys.c
          if ! grep -q "ksu_handle_setresuid" kernel/sys.c; then
            inject_hook kernel/sys.c "SYSCALL_DEFINE3.setresuid" \
              "ksu_handle_setresuid(ruid, euid, suid);"
          fi

          # 6. sys_reboot
          # signature: int ksu_handle_sys_reboot(int magic1, int magic2,
          #                                      unsigned int cmd, void __user **arg)
          add_include kernel/reboot.c
          if [ -f kernel/reboot.c ] && ! grep -q "ksu_handle_sys_reboot" kernel/reboot.c; then
            inject_hook kernel/reboot.c "SYSCALL_DEFINE4.reboot" \
              "ksu_handle_sys_reboot(magic1, magic2, cmd, &arg);"
          fi

          # 7. input_handle_event
          # signature: int ksu_handle_input_handle_event(unsigned int *type,
          #                                              unsigned int *code, int *value)
          # drivers/input/input.c: void input_handle_event(struct input_dev *dev,
          #                                                 unsigned int type,
          #                                                 unsigned int code, int value)
          # local vars: type, code, value → &type, &code, &value
          add_include drivers/input/input.c
          if ! grep -q "ksu_handle_input_handle_event" drivers/input/input.c; then
            inject_hook drivers/input/input.c "void input_handle_event" \
              "ksu_handle_input_handle_event(&type, &code, &value);"
            # Fallback kalau static
            if ! grep -q "ksu_handle_input_handle_event" drivers/input/input.c; then
              inject_hook drivers/input/input.c "static void input_handle_event" \
                "ksu_handle_input_handle_event(&type, &code, &value);"
            fi
          fi

          echo "== Verifikasi 7 hook wajib =="
          for f in fs/exec.c fs/open.c fs/stat.c fs/read_write.c kernel/sys.c kernel/reboot.c drivers/input/input.c; do
            [ -f "$f" ] || continue
            HOOKS=$(grep -o "ksu_handle_[a-z_]*" "$f" 2>/dev/null | sort -u | tr '\n' ' ')
            echo "  $f -> ${HOOKS:-NONE}"
          done

      - name: Cleanup and verify SUSFS patch
        run: |
          cd ${{ env.KERNEL_DIR }}

          echo "[CHK] Checking for remaining reject files..."
          REMAINING_REJECTS=$(find . -name "*.rej" 2>/dev/null)
          if [ -n "$REMAINING_REJECTS" ]; then
            echo "[WARN] Remaining reject files:"
            for rej in $REMAINING_REJECTS; do
              echo "  [FILE] $rej"
              cat "$rej"
              echo ""
            done

            for rej in $REMAINING_REJECTS; do
              TARGET_FILE="${rej%.rej}"
              echo "  [FIX] Trying $rej with fuzz..."
              patch --fuzz=3 "$TARGET_FILE" < "$rej" || true
              rm -f "$rej"
            done
          fi

          FINAL_REJECTS=$(find . -name "*.rej" 2>/dev/null)
          if [ -n "$FINAL_REJECTS" ]; then
            echo "[FAIL] Unresolved reject files remain:"
            echo "$FINAL_REJECTS"
            exit 1
          fi

          find . -name "*.orig" -delete 2>/dev/null || true

          echo ""
          echo "[CHK] Verifying SUSFS integration..."
          for f in fs/susfs.c include/linux/susfs.h KernelSU/kernel/susfs.c; do
            if [ -f "$f" ]; then
              echo "  [OK] $f exists"
            else
              echo "  [i]  $f not found"
            fi
          done

          echo ""
          echo "[OK] SUSFS patch verification complete"

      - name: Setup defconfig
        run: |
          cd ${{ env.KERNEL_DIR }}

          cp ../repo/extracted-config/${{ env.DEFCONFIG_NAME }} \
             arch/arm64/configs/${{ env.DEFCONFIG_NAME }}

          echo "[INFO] Defconfig copied"

          DEFCONFIG="arch/arm64/configs/${{ env.DEFCONFIG_NAME }}"

          add_config() {
            local key="$1"
            local val="$2"
            if grep -q "^${key}=" "$DEFCONFIG" || grep -q "^# ${key} is not set" "$DEFCONFIG"; then
              sed -i "s|^${key}=.*|${key}=${val}|" "$DEFCONFIG"
              sed -i "s|^# ${key} is not set|${key}=${val}|" "$DEFCONFIG"
            else
              echo "${key}=${val}" >> "$DEFCONFIG"
            fi
            echo "  ${key}=${val}"
          }

          echo "[NOTE] Ensuring KSU + SUSFS configs..."
          add_config "CONFIG_KSU" "y"
          add_config "CONFIG_KSU_SUSFS" "y"
          add_config "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT" "y"
          add_config "CONFIG_KSU_SUSFS_SUS_PATH" "y"
          add_config "CONFIG_KSU_SUSFS_SUS_MOUNT" "y"
          add_config "CONFIG_KSU_SUSFS_SUS_KSTAT" "y"
          add_config "CONFIG_KSU_SUSFS_SPOOF_UNAME" "y"
          add_config "CONFIG_KSU_SUSFS_ENABLE_LOG" "y"
          add_config "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS" "y"
          add_config "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG" "y"
          add_config "CONFIG_KSU_SUSFS_OPEN_REDIRECT" "y"
          add_config "CONFIG_KSU_SUSFS_SUS_MAP" "y"
          add_config "CONFIG_KSU_MANUAL_HOOK" "y"

          echo ""
          echo "[OK] Defconfig ready"

      - name: Build kernel
        run: |
          cd ${{ env.KERNEL_DIR }}

          CLANG_DIR="$(pwd)/../toolchain/clang"
          GCC64_DIR="$(pwd)/../toolchain/gcc64"
          GCC32_DIR="$(pwd)/../toolchain/gcc32"

          export PATH="${CLANG_DIR}/bin:${GCC64_DIR}/bin:${GCC32_DIR}/bin:${PATH}"
          export ARCH=arm64
          export SUBARCH=arm64
          export KBUILD_BUILD_USER="${{ env.KBUILD_BUILD_USER }}"
          export KBUILD_BUILD_HOST="${{ env.KBUILD_BUILD_HOST }}"

          echo "[INFO] Toolchain versions:"
          clang --version 2>/dev/null | head -1 || echo "clang not found"
          aarch64-linux-android-gcc --version 2>/dev/null | head -1 || echo "gcc64 not found"
          arm-linux-androideabi-gcc --version 2>/dev/null | head -1 || echo "gcc32 not found"
          echo ""

          MAKE_ARGS=(
            -j$(nproc --all)
            O=out
            ARCH=arm64
            CC=clang
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-android-
            CROSS_COMPILE_ARM32=arm-linux-androideabi-
          )

          echo "================================================"
          echo "  Building defconfig: ${{ env.DEFCONFIG_NAME }}"
          echo "================================================"
          make "${MAKE_ARGS[@]}" ${{ env.DEFCONFIG_NAME }}

          echo ""
          echo "================================================"
          echo "  Compiling kernel..."
          echo "================================================"
          make "${MAKE_ARGS[@]}" 2>&1 | tail -50

          echo ""
          echo "================================================"
          echo "  Build completed"
          echo "================================================"

      - name: Verify kernel output
        run: |
          cd ${{ env.KERNEL_DIR }}

          echo "[CHK] Checking for kernel image output..."
          echo ""

          KERNEL_IMAGE=""
          for img in out/arch/arm64/boot/Image.gz-dtb out/arch/arm64/boot/Image.gz out/arch/arm64/boot/Image out/arch/arm64/boot/Image-dtb; do
            if [ -f "$img" ]; then
              SIZE=$(du -h "$img" | cut -f1)
              echo "  [OK] Found: $img ($SIZE)"
              KERNEL_IMAGE="$img"
            fi
          done

          if [ -f "out/arch/arm64/boot/dtbo.img" ]; then
            echo "  [OK] Found: dtbo.img"
          fi

          if [ -z "$KERNEL_IMAGE" ]; then
            echo "  [FAIL] No kernel image found"
            exit 1
          fi

          echo ""

          if [ -f "out/include/generated/compile.h" ]; then
            echo "[INFO] compile.h:"
            cat out/include/generated/compile.h
            echo ""
          fi

          if grep -q "${{ env.KBUILD_BUILD_USER }}" out/include/generated/compile.h 2>/dev/null; then
            echo "[OK] KBUILD_BUILD_USER is correct"
          fi

          echo "[OK] Kernel build verification complete"

      - name: Upload kernel image
        uses: actions/upload-artifact@v4
        with:
          name: kernel-baikalos13-resukisu-susfs
          path: |
            ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image.gz-dtb
            ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image.gz
            ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image
            ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image-dtb
            ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/dtbo.img
          if-no-files-found: warn
          retention-days: 7

      - name: Upload full out directory
        uses: actions/upload-artifact@v4
        with:
          name: kernel-out-full
          path: |
            ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/
          if-no-files-found: warn
          retention-days: 3

      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Kernel Source | baikalos/android_kernel_xiaomi_sdm845 branch 13.0 |" >> $GITHUB_STEP_SUMMARY
          echo "| Kernel Version | 4.9.337 |" >> $GITHUB_STEP_SUMMARY
          echo "| Root Solution | ReSukiSU |" >> $GITHUB_STEP_SUMMARY
          echo "| SUSFS | v2.2.0 |" >> $GITHUB_STEP_SUMMARY
          echo "| Clang | ${{ env.CLANG_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| GCC64 | aarch64-linux-android-4.9 |" >> $GITHUB_STEP_SUMMARY
          echo "| GCC32 | arm-linux-androideabi-4.9 |" >> $GITHUB_STEP_SUMMARY
          echo "| KBUILD_BUILD_USER | ${{ env.KBUILD_BUILD_USER }} |" >> $GITHUB_STEP_SUMMARY
          echo "| KBUILD_BUILD_HOST | ${{ env.KBUILD_BUILD_HOST }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Defconfig | ${{ env.DEFCONFIG_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -d "${{ env.KERNEL_DIR }}/out/arch/arm64/boot" ]; then
            echo "### Output Files" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            ls -lh ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image* 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No Image files" >> $GITHUB_STEP_SUMMARY
            ls -lh ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/dtbo* 2>/dev/null >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
