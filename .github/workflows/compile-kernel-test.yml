name: Compile Kernel (Test)

on:
  workflow_dispatch:
    inputs:
      resukisu_branch:
        description: "ReSukiSU branch / tag"
        required: false
        default: "main"
      susfs_patch_url:
        description: "URL patch SUSFS 2.2.0 untuk kernel 4.9"
        required: false
        default: "https://raw.githubusercontent.com/JackA1ltman/NonGKI_Kernel_Build_2nd/mainline/Patches/Patch/susfs_patch_to_4.9.patch"

env:
  KERNEL_REPO: https://github.com/baikalos/android_kernel_xiaomi_sdm845
  KERNEL_BRANCH: "13.0"
  KERNEL_DIR: android_kernel_xiaomi_sdm845
  DEFCONFIG_NAME: bos13_defconfig
  KBUILD_BUILD_USER: "Nerf."
  KBUILD_BUILD_HOST: "OldlineSSS"
  CLANG_VERSION: clang-r487747c
  CLANG_URL: "https://github.com/tan2ardiansyah/compiler-nub/releases/download/clang-toolchain/clang-r487747c.tar.gz"
  RESUKISU_REPO: https://github.com/ReSukiSU/ReSukiSU

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      # ================================================================
      # 1. Checkout & Cache setup
      # ================================================================
      - name: Checkout this repository
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-kernel-${{ github.sha }}
          restore-keys: |
            ccache-kernel-

      # ================================================================
      # 2. Install dependencies
      # ================================================================
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ccache curl flex \
            git gnupg gperf imagemagick lib32readline-dev \
            lib32z1-dev libelf-dev liblz4-tool libncurses-dev \
            libncurses5-dev libsdl1.2-dev libssl-dev libxml2 \
            libxml2-utils lzop pngcrush rsync schedtool \
            squashfs-tools xsltproc zip zlib1g-dev \
            python3 python-is-python3 cpio kmod \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi g++-arm-linux-gnueabi \
            binutils-arm-linux-gnueabi \
            ca-certificates lld llvm

          echo "[INFO] Verifying cross toolchain assemblers..."
          which aarch64-linux-gnu-as || echo "[FAIL] aarch64-linux-gnu-as not found"
          which arm-linux-gnueabi-as || echo "[FAIL] arm-linux-gnueabi-as not found"

          ccache --max-size=5G
          ccache --show-stats

      # ================================================================
      # 3. Cache & Download Clang toolchain
      # ================================================================
      - name: Cache Clang
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: toolchain/clang
          key: clang-${{ env.CLANG_VERSION }}-v1

      - name: "Download Clang if cache miss"
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p toolchain/clang
          echo "[INFO] Downloading ${{ env.CLANG_VERSION }}..."
          curl -fsSL -L "${{ env.CLANG_URL }}" -o clang.tar.gz
          tar -xzf clang.tar.gz -C toolchain/clang
          rm -f clang.tar.gz
          echo "[OK] Clang downloaded"
          toolchain/clang/bin/clang --version || true

      # ================================================================
      # 4. Clone kernel source
      # ================================================================
      - name: Clone BaikalOS kernel source
        run: |
          git clone --depth=1 -b ${{ env.KERNEL_BRANCH }} \
            ${{ env.KERNEL_REPO }} ${{ env.KERNEL_DIR }}
          cd ${{ env.KERNEL_DIR }}
          echo "[INFO] Kernel version: $(make kernelversion)"
          echo "[INFO] HEAD: $(git log --oneline -1)"

      # ================================================================
      # 5. Integrate ReSukiSU
      # ================================================================
      - name: Integrate ReSukiSU
        run: |
          cd ${{ env.KERNEL_DIR }}
          echo "[INFO] Running ReSukiSU setup.sh..."
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/${{ github.event.inputs.resukisu_branch || 'main' }}/kernel/setup.sh" | bash
          echo "[OK] ReSukiSU integrated"
          ls -la KernelSU/ || ls -la drivers/kernelsu/ || echo "[WARN] KernelSU dir check"

      # ================================================================
      # 6. Generate ksu_hook.h dari signature ASLI ReSukiSU
      # ================================================================
      - name: "Generate ksu_hook h from ReSukiSU source"
        run: |
          cd ${{ env.KERNEL_DIR }}

          python3 <<'PYEOF'
          import re
          from pathlib import Path

          ksu_dirs = ['KernelSU', 'KernelSU-Next', 'ReSukiSU', 'drivers/kernelsu']
          ksu_dir = next((d for d in ksu_dirs if Path(d).exists()), None)
          if not ksu_dir:
              print("[FAIL] KSU source dir not found")
              exit(1)

          print("[INFO] Found KSU dir: " + ksu_dir)

          signatures = {}
          for pattern in ['*.c', '*.h']:
              for f in Path(ksu_dir).rglob(pattern):
                  try:
                      text = f.read_text(errors='replace')
                  except Exception:
                      continue
                  for m in re.finditer(
                      r'\b(?:int|void)\s+(ksu_handle_\w+)\s*\(([^)]*)\)\s*[;{]',
                      text, re.MULTILINE
                  ):
                      name = m.group(1)
                      params = m.group(2).strip()
                      full_match = m.group(0)
                      rettype = 'int' if full_match.strip().startswith('int') else 'void'
                      if name == 'ksu_handle_stat':
                          if 'const char __user' in params:
                              signatures[name] = (rettype, params)
                          elif name not in signatures:
                              signatures[name] = (rettype, params)
                      else:
                          if name not in signatures or '{' in text[m.end()-1:m.end()]:
                              signatures[name] = (rettype, params)

          wajib_hooks = {
              'ksu_handle_execveat',
              'ksu_handle_faccessat',
              'ksu_handle_stat',
              'ksu_handle_sys_read',
              'ksu_handle_setresuid',
              'ksu_handle_sys_reboot',
              'ksu_handle_input_handle_event',
          }

          print("[INFO] Total signatures extracted: " + str(len(signatures)))

          header = [
              '/* Auto-generated ksu_hook.h - 7 hook wajib (signature ASLI) */',
              '#ifndef __KSU_HOOK_H',
              '#define __KSU_HOOK_H',
              '',
              '#include <linux/types.h>',
              '#include <linux/uidgid.h>',
              '',
              'struct file;',
              'struct filename;',
              '',
          ]

          for name in sorted(wajib_hooks):
              if name in signatures:
                  rettype, params = signatures[name]
                  header.append('extern {} {}({});'.format(rettype, name, params))
                  print("  [OK] {} {}({})".format(rettype, name, params))
              else:
                  print("  [WARN] Missing in source: " + name)

          header.append('')
          header.append('#endif')

          out = Path('include/linux/ksu_hook.h')
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text('\n'.join(header))
          PYEOF

      # ================================================================
      # 7. Apply SUSFS patch
      # ================================================================
      - name: Apply SUSFS patch
        run: |
          cd ${{ env.KERNEL_DIR }}

          SUSFS_PATCH_URL="${{ github.event.inputs.susfs_patch_url || 'https://raw.githubusercontent.com/JackA1ltman/NonGKI_Kernel_Build_2nd/mainline/Patches/Patch/susfs_patch_to_4.9.patch' }}"

          echo "[INFO] Downloading SUSFS patch..."
          curl -fsSL "$SUSFS_PATCH_URL" -o susfs_patch_to_4.9.patch

          echo "[INFO] Applying SUSFS patch..."
          git apply --reject --whitespace=fix susfs_patch_to_4.9.patch || true

          echo ""
          echo "[CHK] Checking for reject files..."
          REJECTS=$(find . -name "*.rej" 2>/dev/null)
          if [ -n "$REJECTS" ]; then
            echo "[WARN] Found reject files:"
            echo "$REJECTS"
          else
            echo "[OK] No reject files"
          fi

      # ================================================================
      # 8. Manual fix SUSFS hunks (generate header + inject includes)
      # ================================================================
      - name: "Manual fix SUSFS hunks"
        run: |
          cd ${{ env.KERNEL_DIR }}

          # STEP 1: Auto-generate include/linux/susfs_extern.h
          echo "[INFO] Generating include/linux/susfs_extern.h..."
          python3 <<'PYEOF'
          import re
          from pathlib import Path
          import glob

          source_files = []
          for pattern in ["fs/susfs.c", "fs/susfs_*.c",
                          "include/linux/susfs.h", "include/linux/susfs_def.h"]:
              for f in glob.glob(pattern):
                  source_files.append(Path(f))
          for pattern in ["KernelSU/kernel/*.c", "KernelSU/kernel/*.h",
                          "KernelSU/kernel/**/*.c", "KernelSU/kernel/**/*.h"]:
              for f in glob.glob(pattern, recursive=True):
                  source_files.append(Path(f))
          for pattern in ["fs/open.c", "fs/exec.c", "fs/read_write.c", "fs/stat.c",
                          "fs/namespace.c"]:
              p = Path(pattern)
              if p.exists():
                  source_files.append(p)

          print("[INFO] Scanning {} source files".format(len(source_files)))

          static_keys_true = set()
          static_keys_false = set()
          funcs = {}

          FUNC_DEF_PATTERN = re.compile(
              r'^(?!\s*//|\s*\*|\s*/\*)'
              r'(?:__\w+\s+)?'
              r'(?:inline\s+)?'
              r'('
              r'(?:struct\s+\w+|bool|void|int|long|size_t|ssize_t|unsigned(?:\s+\w+)?)'
              r'\s*\**\s*'
              r')'
              r'(susfs_\w+)'
              r'\s*\('
              r'([^)]*)'
              r'\)\s*\{',
              re.MULTILINE
          )

          FUNC_PROTO_PATTERN = re.compile(
              r'^(?!\s*//|\s*\*|\s*/\*)'
              r'(?:extern\s+)?'
              r'('
              r'(?:struct\s+\w+|bool|void|int|long|size_t|ssize_t|unsigned(?:\s+\w+)?)'
              r'\s*\**\s*'
              r')'
              r'(susfs_\w+)'
              r'\s*\('
              r'([^)]*)'
              r'\)\s*;',
              re.MULTILINE
          )

          for f in source_files:
              try:
                  text = f.read_text(errors='replace')
              except Exception:
                  continue

              for name in re.findall(r'DEFINE_STATIC_KEY_TRUE\s*\(\s*(\w+)\s*\)', text):
                  static_keys_true.add(name)
              for name in re.findall(r'DEFINE_STATIC_KEY_FALSE\s*\(\s*(\w+)\s*\)', text):
                  static_keys_false.add(name)

              for m in FUNC_DEF_PATTERN.finditer(text):
                  rettype = re.sub(r'\s+', ' ', m.group(1).strip())
                  name = m.group(2)
                  params = m.group(3).strip()

                  start = max(0, m.start() - 100)
                  preamble = text[start:m.start()]
                  last_newline = preamble.rfind('\n')
                  same_line = preamble[last_newline:] if last_newline >= 0 else preamble
                  if re.search(r'\bstatic\b', same_line):
                      continue

                  funcs[name] = (rettype, params)

              for m in FUNC_PROTO_PATTERN.finditer(text):
                  rettype = re.sub(r'\s+', ' ', m.group(1).strip())
                  name = m.group(2)
                  params = m.group(3).strip()
                  if name not in funcs:
                      funcs[name] = (rettype, params)

          header = [
              '/* Auto-generated SUSFS extern header */',
              '#ifndef __SUSFS_EXTERN_H',
              '#define __SUSFS_EXTERN_H',
              '',
              '#include <linux/types.h>',
              '#include <linux/jump_label.h>',
              '',
              '/* Forward declarations */',
              'struct inode;', 'struct kstat;', 'struct path;', 'struct dentry;',
              'struct file;', 'struct filename;', 'struct vfsmount;',
              'struct super_block;', 'struct mount;', 'struct seq_file;',
              'struct task_struct;', 'struct vm_area_struct;', 'struct mm_struct;',
              'struct pt_regs;', 'struct linux_binprm;', 'struct new_utsname;',
              '',
              '/* ==== Static keys ==== */',
          ]

          for name in sorted(static_keys_true):
              header.append('extern struct static_key_true {};'.format(name))
          for name in sorted(static_keys_false):
              header.append('extern struct static_key_false {};'.format(name))

          header.append('')
          header.append('/* ==== Function declarations ==== */')

          for name in sorted(funcs.keys()):
              rettype, params = funcs[name]
              header.append('extern {} {}({});'.format(rettype, name, params))

          header.append('')
          header.append('#endif /* __SUSFS_EXTERN_H */')

          out = Path("include/linux/susfs_extern.h")
          out.write_text('\n'.join(header))

          print("[OK] Generated:")
          print("  Static keys (true):  {}".format(len(static_keys_true)))
          print("  Static keys (false): {}".format(len(static_keys_false)))
          print("  Functions:           {}".format(len(funcs)))
          PYEOF

          # STEP 2: Fix proc_namespace.c include
          if [ -f fs/proc_namespace.c ] && ! grep -q "susfs_def.h" fs/proc_namespace.c; then
            sed -i '/#include "pnode.h"/a\
          #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\
          #include <linux/susfs_def.h>\
          #endif' fs/proc_namespace.c || true
          fi

          # STEP 3: Fix fs/stat.c sus_kstat hunk
          if [ -f fs/stat.c ] && ! grep -q "int err = inode->i_op->getattr" fs/stat.c; then
            python3 <<'PYEOF'
          import re
          from pathlib import Path
          p = Path("fs/stat.c")
          text = p.read_text()
          pattern = re.compile(
              r'(\tif\s*\(inode->i_op->getattr\)\s*\n)'
              r'(\t\treturn inode->i_op->getattr\(path->mnt,\s*path->dentry,\s*stat\);)',
              re.MULTILINE
          )
          replacement = (
              r'\1'
              '#ifdef CONFIG_KSU_SUSFS_SUS_KSTAT\n\t{\n'
              '\t\tint err = inode->i_op->getattr(path->mnt, path->dentry, stat);\n'
              '\t\tif (!err)\n'
              '\t\t\tsusfs_sus_kstat_spoof_generic_fillattr(inode, stat);\n'
              '\t\treturn err;\n\t}\n#else\n' r'\2' '\n#endif'
          )
          new_text, n = pattern.subn(replacement, text)
          if n > 0:
              p.write_text(new_text)
              print("  [OK] Patched fs/stat.c sus_kstat block")
          PYEOF
          fi

          # STEP 4: HAPUS manual extern SUSFS dari SEMUA file
          python3 <<'PYEOF'
          from pathlib import Path
          import re

          files_to_clean = [
              "fs/stat.c", "fs/proc_namespace.c",
              "fs/proc/task_mmu.c", "fs/proc/cmdline.c",
              "fs/open.c", "fs/read_write.c", "fs/namespace.c",
              "fs/exec.c", "kernel/sys.c", "kernel/reboot.c",
              "drivers/input/input.c",
          ]

          for filepath in files_to_clean:
              p = Path(filepath)
              if not p.exists():
                  continue
              text = p.read_text()
              original = text

              text = re.sub(
                  r'\n#ifdef CONFIG_KSU_SUSFS[^\n]*\n'
                  r'(?:extern [^\n]*susfs_[^\n]*\n)+'
                  r'#endif\n',
                  '\n',
                  text
              )

              lines = text.split('\n')
              cleaned = []
              for line in lines:
                  stripped = line.strip()
                  if (stripped.startswith('extern ')
                      and 'susfs_' in stripped
                      and stripped.endswith(';')):
                      continue
                  cleaned.append(line)
              text = '\n'.join(cleaned)

              if text != original:
                  p.write_text(text)
                  print("  [OK] Removed manual SUSFS externs from {}".format(filepath))
          PYEOF

          # STEP 5: Inject header ke semua SUSFS files
          python3 <<'PYEOF'
          from pathlib import Path

          susfs_files = [
              "fs/open.c", "fs/stat.c", "fs/proc_namespace.c",
              "fs/proc/task_mmu.c", "fs/proc/cmdline.c",
              "fs/read_write.c", "fs/namespace.c",
              "fs/exec.c", "kernel/sys.c", "kernel/reboot.c",
              "drivers/input/input.c",
          ]

          required_includes = [
              '#include <linux/jump_label.h>',
              '#include <linux/susfs.h>',
              '#include <linux/susfs_def.h>',
              '#include <linux/susfs_extern.h>',
          ]

          for filepath in susfs_files:
              p = Path(filepath)
              if not p.exists():
                  continue
              text = p.read_text()
              lines = text.split('\n')

              missing = []
              for inc in required_includes:
                  inc_name = inc.split('<')[1].split('>')[0]
                  if inc_name not in text:
                      missing.append(inc)

              if not missing:
                  continue

              insert_idx = -1
              for i, line in enumerate(lines):
                  if line.strip().startswith('#include'):
                      insert_idx = i
                      break
              if insert_idx == -1:
                  continue

              lines[insert_idx:insert_idx] = missing
              p.write_text('\n'.join(lines))
              print("  [OK] Added {} include(s) to {}".format(len(missing), filepath))
          PYEOF

          # STEP 6: Cleanup duplicate EXPORT_SYMBOL block
          if [ -f fs/stat.c ] && grep -q "^EXPORT_SYMBOL(vfs_getattr_nosec);$" fs/stat.c; then
            python3 <<'PYEOF'
          from pathlib import Path
          p = Path("fs/stat.c")
          lines = p.read_text().split('\n')
          new_lines = []
          i = 0
          removed = False
          while i < len(lines):
              line = lines[i]
              new_lines.append(line)
              if (not removed and line.strip() == 'EXPORT_SYMBOL(vfs_getattr_nosec);'
                  and i + 3 < len(lines)):
                  if (lines[i+1].strip() == '#ifdef CONFIG_KSU_SUSFS_SUS_KSTAT'
                      and 'susfs_sus_kstat_spoof_generic_fillattr' in lines[i+2].strip()
                      and lines[i+3].strip() == '#endif'):
                      i += 4
                      removed = True
                      continue
              i += 1
          if removed:
              p.write_text('\n'.join(new_lines))
              print("  [OK] Cleaned up duplicate EXPORT_SYMBOL block")
          PYEOF
          fi

          echo ""
          echo "[OK] SUSFS manual fixes applied"

      # ================================================================
      # 9. Cleanup remaining reject files (HARUS SEBELUM Fix cmdline.c!)
      # ================================================================
      - name: Cleanup remaining reject files
        run: |
          cd ${{ env.KERNEL_DIR }}

          echo "[CHK] Checking for remaining reject files..."
          REMAINING=$(find . -name "*.rej" 2>/dev/null)
          if [ -n "$REMAINING" ]; then
            echo "[WARN] Remaining reject files:"
            echo "$REMAINING"
            for rej in $REMAINING; do
              TARGET_FILE="${rej%.rej}"
              echo "  [FIX] Trying $rej with fuzz..."
              patch --fuzz=3 "$TARGET_FILE" < "$rej" || true
              rm -f "$rej"
            done
          fi

          FINAL=$(find . -name "*.rej" 2>/dev/null)
          if [ -n "$FINAL" ]; then
            echo "[FAIL] Unresolved reject files:"
            echo "$FINAL"
            exit 1
          fi

          find . -name "*.orig" -delete 2>/dev/null || true
          echo "[OK] Cleanup complete"

      # ================================================================
      # 10. REBUILD fs/proc/cmdline.c (setelah cleanup, jadi HASIL AKHIR)
      # ================================================================
      - name: "Fix fs/proc/cmdline.c - REBUILD from clean template"
        run: |
          cd ${{ env.KERNEL_DIR }}

          FILE="fs/proc/cmdline.c"
          [ ! -f "$FILE" ] && exit 0

          # SAFETY: hapus .rej dan .orig kalau ada (biar tidak ke-apply lagi)
          rm -f "${FILE}.rej" "${FILE}.orig"

          echo "======================================================"
          echo "  BEFORE REBUILD (current state):"
          echo "======================================================"
          wc -l "$FILE"
          echo ""
          echo "  Occurrences:"
          echo "    cmdline_proc_show:  $(grep -c "cmdline_proc_show" "$FILE")"
          echo "    cmdline_proc_open:  $(grep -c "cmdline_proc_open" "$FILE")"
          echo "    cmdline_proc_fops:  $(grep -c "cmdline_proc_fops" "$FILE")"
          echo "    patch_flag:         $(grep -c "^static void patch_flag" "$FILE")"

          # Deteksi BaikalOS custom (pakai patch_flag + new_command_line)
          USES_PATCH_FLAG=$(grep -c "^static void patch_flag" "$FILE" || echo 0)

          # Backup
          cp "$FILE" "$FILE.original.bak"

          echo ""
          echo "[REBUILD] Writing clean file..."

          if [ "$USES_PATCH_FLAG" -gt 0 ]; then
            echo "  [INFO] BaikalOS variant detected"

            cat > "$FILE" <<'CFILE'
          // SPDX-License-Identifier: GPL-2.0
          #include <linux/jump_label.h>
          #include <linux/susfs.h>
          #include <linux/susfs_def.h>
          #include <linux/susfs_extern.h>
          #include <linux/fs.h>
          #include <linux/init.h>
          #include <linux/proc_fs.h>
          #include <linux/seq_file.h>
          #include <asm/setup.h>

          static char new_command_line[COMMAND_LINE_SIZE];

          static int cmdline_proc_show(struct seq_file *m, void *v)
          {
          #ifdef CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG
          	if (static_branch_likely(&susfs_is_fake_cmdline_or_bootconfig_buffer_set)) {
          		susfs_spoof_cmdline_or_bootconfig(m);
          		return 0;
          	}
          #endif
          	seq_puts(m, new_command_line);
          	seq_putc(m, '\n');
          	return 0;
          }

          static int cmdline_proc_open(struct inode *inode, struct file *file)
          {
          	return single_open(file, cmdline_proc_show, NULL);
          }

          static const struct file_operations cmdline_proc_fops = {
          	.open		= cmdline_proc_open,
          	.read		= seq_read,
          	.llseek		= seq_lseek,
          	.release	= single_release,
          };

          static void patch_flag(char *cmd, const char *flag, const char *val)
          {
          	size_t flag_len, val_len;
          	char *start, *end;

          	start = strstr(cmd, flag);
          	if (!start)
          		return;

          	flag_len = strlen(flag);
          	val_len = strlen(val);
          	end = start + flag_len + strcspn(start + flag_len, " ");
          	memmove(start + flag_len + val_len, end, strlen(end) + 1);
          	memcpy(start + flag_len, val, val_len);
          }

          static int __init proc_cmdline_init(void)
          {
          	strcpy(new_command_line, saved_command_line);
          	patch_flag(new_command_line, "androidboot.verifiedbootstate=",
          		"green androidboot.vbmeta.digest=8c36e88b4b331f29ed15d3f12e39f776b8e011b2db1228d313ee9ac15549d7c4 androidboot.vbmeta.hash_alg=sha256 androidboot.vbmeta.size=4096 androidboot.vbmeta.avb_version=1.1");
          	patch_flag(new_command_line, "buildvariant=", "user");

          	proc_create("cmdline", 0, NULL, &cmdline_proc_fops);
          	return 0;
          }
          fs_initcall(proc_cmdline_init);
          CFILE

          else
            echo "  [INFO] Standard vanilla kernel template"

            cat > "$FILE" <<'CFILE'
          // SPDX-License-Identifier: GPL-2.0
          #include <linux/jump_label.h>
          #include <linux/susfs.h>
          #include <linux/susfs_def.h>
          #include <linux/susfs_extern.h>
          #include <linux/fs.h>
          #include <linux/init.h>
          #include <linux/proc_fs.h>
          #include <linux/seq_file.h>
          #include <asm/setup.h>

          static int cmdline_proc_show(struct seq_file *m, void *v)
          {
          #ifdef CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG
          	if (static_branch_likely(&susfs_is_fake_cmdline_or_bootconfig_buffer_set)) {
          		susfs_spoof_cmdline_or_bootconfig(m);
          		return 0;
          	}
          #endif
          	seq_puts(m, saved_command_line);
          	seq_putc(m, '\n');
          	return 0;
          }

          static int cmdline_proc_open(struct inode *inode, struct file *file)
          {
          	return single_open(file, cmdline_proc_show, NULL);
          }

          static const struct file_operations cmdline_proc_fops = {
          	.open		= cmdline_proc_open,
          	.read		= seq_read,
          	.llseek		= seq_lseek,
          	.release	= single_release,
          };

          static int __init proc_cmdline_init(void)
          {
          	proc_create("cmdline", 0, NULL, &cmdline_proc_fops);
          	return 0;
          }
          fs_initcall(proc_cmdline_init);
          CFILE
          fi

          echo "[OK] File rebuilt"

          echo ""
          echo "======================================================"
          echo "  AFTER REBUILD: fs/proc/cmdline.c FULL"
          echo "======================================================"
          cat -n "$FILE"

          echo ""
          echo "  Occurrences (should be 1x each):"
          echo "    cmdline_proc_show:  $(grep -c "cmdline_proc_show" "$FILE")"
          echo "    cmdline_proc_open:  $(grep -c "cmdline_proc_open" "$FILE")"
          echo "    cmdline_proc_fops:  $(grep -c "cmdline_proc_fops" "$FILE")"
          echo "    #ifdef count:       $(grep -c "^#ifdef" "$FILE")"
          echo "    #endif count:       $(grep -c "^#endif" "$FILE")"

      # ================================================================
      # 11. DEBUG - Final verification before build
      # ================================================================
      - name: "DEBUG - Final verification"
        run: |
          cd ${{ env.KERNEL_DIR }}

          echo "======================================================"
          echo "  1. Susfs headers check"
          echo "======================================================"
          if [ -f include/linux/susfs_extern.h ]; then
            echo "  [OK] susfs_extern.h exists ($(wc -l < include/linux/susfs_extern.h) lines)"
            echo "  Static keys: $(grep -c '^extern struct static_key' include/linux/susfs_extern.h)"
            echo "  Functions:   $(grep -c '^extern [^s]' include/linux/susfs_extern.h)"
          fi

          echo ""
          echo "======================================================"
          echo "  2. fs/proc/cmdline.c final state"
          echo "======================================================"
          wc -l fs/proc/cmdline.c
          echo "  Occurrences (each should be 1):"
          echo "    cmdline_proc_show:  $(grep -c cmdline_proc_show fs/proc/cmdline.c)"
          echo "    cmdline_proc_open:  $(grep -c cmdline_proc_open fs/proc/cmdline.c)"
          echo "    static_branch_likely: $(grep -c static_branch_likely fs/proc/cmdline.c)"

          echo ""
          echo "======================================================"
          echo "  3. No leftover .rej or .orig files"
          echo "======================================================"
          REJECTS=$(find . -name "*.rej" 2>/dev/null | head -10)
          if [ -n "$REJECTS" ]; then
            echo "  [WARN] .rej files still present:"
            echo "$REJECTS"
          else
            echo "  [OK] No .rej files"
          fi

          echo ""
          echo "[OK] Final verification complete"

      # ================================================================
      # 12. Inject 7 hook WAJIB (signature ASLI)
      # ================================================================
      - name: "Apply 7 hook WAJIB signature ASLI"
        run: |
          cd ${{ env.KERNEL_DIR }}

          inject_hook() {
            local file="$1"
            local func_pat="$2"
            local hook_line="$3"
            [ -f "$file" ] || return 1
            awk -v pat="$func_pat" -v hook="$hook_line" '
              $0 ~ pat { in_func=1 }
              in_func && /^\{/ && !done {
                print
                print "\t/* ReSukiSU hook */"
                print "\t" hook
                done=1; in_func=0; next
              }
              { print }
            ' "$file" > "$file.tmp" && mv "$file.tmp" "$file"
          }

          add_include() {
            local file="$1"
            [ -f "$file" ] || return
            if ! grep -q "linux/ksu_hook.h" "$file"; then
              sed -i '0,/^#include/s||#include <linux/ksu_hook.h>\n&|' "$file"
            fi
          }

          # 1. execveat
          add_include fs/exec.c
          if ! grep -q "ksu_handle_execveat" fs/exec.c; then
            inject_hook fs/exec.c "static int do_execveat_common" \
              "ksu_handle_execveat(&fd, &filename, &argv, &envp, &flags);"
            if ! grep -q "ksu_handle_execveat" fs/exec.c; then
              inject_hook fs/exec.c "int do_execveat_common" \
                "ksu_handle_execveat(&fd, &filename, &argv, &envp, &flags);"
            fi
          fi

          # 2. faccessat
          add_include fs/open.c
          if ! grep -q "ksu_handle_faccessat" fs/open.c; then
            inject_hook fs/open.c "SYSCALL_DEFINE3.faccessat" \
              "ksu_handle_faccessat(&dfd, &filename, &mode, NULL);"
          fi

          # 3. stat
          add_include fs/stat.c
          if ! grep -q "ksu_handle_stat" fs/stat.c; then
            inject_hook fs/stat.c "SYSCALL_DEFINE4.newfstatat" \
              "ksu_handle_stat(&dfd, &filename, &flag);"
          fi

          # 4. sys_read
          add_include fs/read_write.c
          if ! grep -q "ksu_handle_sys_read" fs/read_write.c; then
            inject_hook fs/read_write.c "SYSCALL_DEFINE3.read" \
              "ksu_handle_sys_read(fd, &buf, &count);"
          fi

          # 5. setresuid
          add_include kernel/sys.c
          if ! grep -q "ksu_handle_setresuid" kernel/sys.c; then
            inject_hook kernel/sys.c "SYSCALL_DEFINE3.setresuid" \
              "ksu_handle_setresuid(ruid, euid, suid);"
          fi

          # 6. sys_reboot
          add_include kernel/reboot.c
          if [ -f kernel/reboot.c ] && ! grep -q "ksu_handle_sys_reboot" kernel/reboot.c; then
            inject_hook kernel/reboot.c "SYSCALL_DEFINE4.reboot" \
              "ksu_handle_sys_reboot(magic1, magic2, cmd, &arg);"
          fi

          # 7. input_handle_event
          add_include drivers/input/input.c
          if ! grep -q "ksu_handle_input_handle_event" drivers/input/input.c; then
            inject_hook drivers/input/input.c "void input_handle_event" \
              "ksu_handle_input_handle_event(&type, &code, &value);"
            if ! grep -q "ksu_handle_input_handle_event" drivers/input/input.c; then
              inject_hook drivers/input/input.c "static void input_handle_event" \
                "ksu_handle_input_handle_event(&type, &code, &value);"
            fi
          fi

          echo ""
          echo "== Verifikasi 7 hook wajib =="
          for f in fs/exec.c fs/open.c fs/stat.c fs/read_write.c kernel/sys.c kernel/reboot.c drivers/input/input.c; do
            [ -f "$f" ] || continue
            HOOKS=$(grep -o "ksu_handle_[a-z_]*" "$f" 2>/dev/null | sort -u | tr '\n' ' ')
            echo "  $f -> ${HOOKS:-NONE}"
          done

      # ================================================================
      # 13. Verify SUSFS integration
      # ================================================================
      - name: Verify SUSFS integration
        run: |
          cd ${{ env.KERNEL_DIR }}

          echo "[CHK] Verifying SUSFS integration..."
          for f in fs/susfs.c include/linux/susfs.h include/linux/susfs_def.h include/linux/susfs_extern.h include/linux/ksu_hook.h KernelSU/kernel/susfs.c; do
            if [ -f "$f" ]; then
              echo "  [OK] $f exists"
            else
              echo "  [i]  $f not found"
            fi
          done

          echo ""
          echo "[OK] Verification complete"

      # ================================================================
      # 14. Setup defconfig
      # ================================================================
      - name: Setup defconfig
        run: |
          cd ${{ env.KERNEL_DIR }}

          cp ../repo/extracted-config/${{ env.DEFCONFIG_NAME }} \
             arch/arm64/configs/${{ env.DEFCONFIG_NAME }}

          echo "[INFO] Defconfig copied"

          DEFCONFIG="arch/arm64/configs/${{ env.DEFCONFIG_NAME }}"

          add_config() {
            local key="$1"
            local val="$2"
            if grep -q "^${key}=" "$DEFCONFIG" || grep -q "^# ${key} is not set" "$DEFCONFIG"; then
              sed -i "s|^${key}=.*|${key}=${val}|" "$DEFCONFIG"
              sed -i "s|^# ${key} is not set|${key}=${val}|" "$DEFCONFIG"
            else
              echo "${key}=${val}" >> "$DEFCONFIG"
            fi
            echo "  ${key}=${val}"
          }

          echo "[NOTE] Ensuring KSU + SUSFS + manual hook configs..."

          add_config "CONFIG_KSU" "y"
          add_config "CONFIG_KSU_MANUAL_HOOK" "y"
          add_config "CONFIG_KSU_SUSFS" "y"
          add_config "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT" "y"
          add_config "CONFIG_KSU_SUSFS_SUS_PATH" "y"
          add_config "CONFIG_KSU_SUSFS_SUS_MOUNT" "y"
          add_config "CONFIG_KSU_SUSFS_SUS_KSTAT" "y"
          add_config "CONFIG_KSU_SUSFS_SPOOF_UNAME" "y"
          add_config "CONFIG_KSU_SUSFS_ENABLE_LOG" "y"
          add_config "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS" "y"
          add_config "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG" "y"
          add_config "CONFIG_KSU_SUSFS_OPEN_REDIRECT" "y"
          add_config "CONFIG_KSU_SUSFS_SUS_MAP" "y"

          echo ""
          echo "[OK] Defconfig ready"

      # ================================================================
      # 15. Fix CLANG_PREFIX32 for VDSO 32-bit compat
      # ================================================================
      - name: "Patch arch/arm64/Makefile - fix CLANG_PREFIX32"
        run: |
          cd ${{ env.KERNEL_DIR }}
          MAIN_MK="arch/arm64/Makefile"

          if [ ! -f "$MAIN_MK" ]; then
            echo "[FAIL] $MAIN_MK not found"
            exit 1
          fi

          cp "$MAIN_MK" "$MAIN_MK.orig"

          sed -i -E \
            's@(CLANG_PREFIX32[[:space:]]*:=[[:space:]]*--prefix=\$\(GCC_TOOLCHAIN32_DIR\))[[:space:]]*$@\1$(notdir $(CROSS_COMPILE_ARM32))@' \
            "$MAIN_MK"

          if ! diff -q "$MAIN_MK" "$MAIN_MK.orig" > /dev/null; then
            echo "[OK] CLANG_PREFIX32 patch applied"
            grep -n "CLANG_PREFIX32" "$MAIN_MK"
          else
            echo "[i] CLANG_PREFIX32 pattern not matched (may be optional)"
          fi

          rm -f "$MAIN_MK.orig"

      # ================================================================
      # 16. Skip broken DTB
      # ================================================================
      - name: "Skip broken DTB (QVR, SDM670 interposer)"
        run: |
          cd ${{ env.KERNEL_DIR }}
          DTS_MK="arch/arm64/boot/dts/qcom/Makefile"

          if [ ! -f "$DTS_MK" ]; then
            echo "[WARN] $DTS_MK not found, skipping"
            exit 0
          fi

          BROKEN_DTBS=(
            "sdm845-v2-qvr-evt.dtb"
            "sdm845-v2-qvr-dvt.dtb"
            "sdm845-interposer-sdm670-mtp.dtb"
            "sdm845-interposer-sdm670-cdp.dtb"
          )

          cp "$DTS_MK" "$DTS_MK.orig"

          for dtb in "${BROKEN_DTBS[@]}"; do
            if grep -q "$dtb" "$DTS_MK"; then
              sed -i "/$dtb/d" "$DTS_MK"
              echo "[OK] Removed $dtb from $DTS_MK"
            fi
          done

          rm -f "$DTS_MK.orig"

      # ================================================================
      # 17. Build Kernel
      # ================================================================
      - name: Build kernel
        run: |
          CLANG_DIR="$GITHUB_WORKSPACE/toolchain/clang"
          export PATH="${CLANG_DIR}/bin:${PATH}"

          export ARCH=arm64
          export SUBARCH=arm64
          export KBUILD_BUILD_USER="${{ env.KBUILD_BUILD_USER }}"
          export KBUILD_BUILD_HOST="${{ env.KBUILD_BUILD_HOST }}"
          export USE_CCACHE=1
          export CCACHE_DIR="$GITHUB_WORKSPACE/.ccache"

          cd ${{ env.KERNEL_DIR }}

          echo "[INFO] Toolchain versions:"
          clang --version | head -1
          ld.lld --version | head -1
          aarch64-linux-gnu-as --version | head -1
          arm-linux-gnueabi-as --version | head -1
          echo ""

          MAKE_ARGS=(
            O=out
            ARCH=arm64
            LLVM=1
            LLVM_IAS=0
            CC="ccache clang"
            LD=ld.lld
            AR=llvm-ar
            NM=llvm-nm
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            STRIP=llvm-strip
            READELF=llvm-readelf
            HOSTCC=clang
            HOSTCXX=clang++
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-gnu-
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          )

          echo "================================================"
          echo "  Generating defconfig: ${{ env.DEFCONFIG_NAME }}"
          echo "================================================"
          make -j$(nproc --all) "${MAKE_ARGS[@]}" ${{ env.DEFCONFIG_NAME }}

          echo ""
          echo "================================================"
          echo "  Compiling kernel (parallel)..."
          echo "================================================"

          set +e
          make -j$(nproc --all) "${MAKE_ARGS[@]}" 2>&1 | tee build.log
          BUILD_STATUS=${PIPESTATUS[0]}
          set -e

          echo ""
          echo "================================================"
          if [ $BUILD_STATUS -eq 0 ]; then
            echo "  [OK] Build completed successfully"
            ccache --show-stats
            exit 0
          fi

          echo "  [FAIL] Build failed with exit code $BUILD_STATUS"
          echo "================================================"

          echo ""
          echo "======================================================"
          echo "  DIAGNOSTIC: Grep 'error:' / 'Error' / 'fatal:' lines"
          echo "======================================================"
          grep -nE 'error:|Error [0-9]+|fatal:|undefined reference|multiple definition' build.log | head -50
          echo ""

          echo "======================================================"
          echo "  DIAGNOSTIC: 30 lines around first 'error:' or 'Error'"
          echo "======================================================"
          FIRST_ERROR_LINE=$(grep -nE 'error:|fatal:|undefined reference' build.log | head -1 | cut -d: -f1)
          if [ -n "$FIRST_ERROR_LINE" ]; then
            START=$((FIRST_ERROR_LINE - 20))
            [ $START -lt 1 ] && START=1
            END=$((FIRST_ERROR_LINE + 20))
            sed -n "${START},${END}p" build.log
          else
            echo "  [i] No 'error:' pattern found, showing 200 last lines:"
            tail -200 build.log
          fi

          echo ""
          echo "======================================================"
          echo "  RETRY with -j1 to isolate the actual error"
          echo "======================================================"
          set +e
          make -j1 "${MAKE_ARGS[@]}" 2>&1 | tee build-j1.log | tail -100
          set -e

          echo ""
          echo "======================================================"
          echo "  FINAL error extraction from -j1 log"
          echo "======================================================"
          if [ -f build-j1.log ]; then
            grep -nE 'error:|Error [0-9]+|fatal:' build-j1.log | head -30
          fi

          exit $BUILD_STATUS

      # ================================================================
      # 18. Verify kernel output
      # ================================================================
      - name: Verify kernel output
        run: |
          cd ${{ env.KERNEL_DIR }}

          echo "[CHK] Checking for kernel image output..."
          echo ""

          KERNEL_IMAGE=""
          for img in out/arch/arm64/boot/Image.gz-dtb out/arch/arm64/boot/Image.gz out/arch/arm64/boot/Image out/arch/arm64/boot/Image-dtb; do
            if [ -f "$img" ]; then
              SIZE=$(du -h "$img" | cut -f1)
              echo "  [OK] Found: $img ($SIZE)"
              KERNEL_IMAGE="$img"
            fi
          done

          if [ -f "out/arch/arm64/boot/dtbo.img" ]; then
            echo "  [OK] Found: dtbo.img"
          fi

          if [ -z "$KERNEL_IMAGE" ]; then
            echo "  [FAIL] No kernel image found"
            exit 1
          fi

          echo "[OK] Kernel build verification complete"

      # ================================================================
      # 19. Upload artifacts
      # ================================================================
      - name: Upload kernel image
        uses: actions/upload-artifact@v4
        with:
          name: kernel-baikalos13-resukisu-susfs
          path: |
            ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image.gz-dtb
            ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image.gz
            ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image
            ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image-dtb
            ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/dtbo.img
          if-no-files-found: warn
          retention-days: 7

      - name: Upload full out directory
        uses: actions/upload-artifact@v4
        with:
          name: kernel-out-full
          path: |
            ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/
          if-no-files-found: warn
          retention-days: 3

      # ================================================================
      # 20. Build summary
      # ================================================================
      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Kernel Source | baikalos/android_kernel_xiaomi_sdm845 branch 13.0 |" >> $GITHUB_STEP_SUMMARY
          echo "| Kernel Version | 4.9.337 |" >> $GITHUB_STEP_SUMMARY
          echo "| Root Solution | ReSukiSU (manual hook, 7 hooks) |" >> $GITHUB_STEP_SUMMARY
          echo "| SUSFS | v2.2.0 |" >> $GITHUB_STEP_SUMMARY
          echo "| Clang | ${{ env.CLANG_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cross Toolchain | GNU (Ubuntu apt) |" >> $GITHUB_STEP_SUMMARY
          echo "| KBUILD_BUILD_USER | ${{ env.KBUILD_BUILD_USER }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Defconfig | ${{ env.DEFCONFIG_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -d "${{ env.KERNEL_DIR }}/out/arch/arm64/boot" ]; then
            echo "### Output Files" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            ls -lh ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image* 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No Image files" >> $GITHUB_STEP_SUMMARY
            ls -lh ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/dtbo* 2>/dev/null >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
