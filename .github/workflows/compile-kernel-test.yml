name: Compile Kernel (BaikalOS 13.0 + ReSukiSU + SUSFS)

on:
  workflow_dispatch:
    inputs:
      kernel_branch:
        description: "Branch kernel BaikalOS yang di-checkout"
        required: true
        default: "13.0"
      susfs_branch:
        description: "Branch susfs4ksu (harus sesuai versi kernel, JANGAN diubah kecuali tahu resikonya)"
        required: true
        default: "kernel-4.9"
      resukisu_ref:
        description: "Tag/branch ReSukiSU yang dipakai (kosongkan = default/latest dari setup.sh)"
        required: false
        default: ""
      clean_build:
        description: "Bersihkan out/ sebelum build (mrproper)"
        type: boolean
        default: false

env:
  # ==== Sumber kernel ====
  KERNEL_REPO: https://github.com/baikalos/android_kernel_xiaomi_sdm845
  KERNEL_DIR: kernel

  # Nama file defconfig ASLI di kernel source. Nama ini TIDAK BOLEH diubah
  # supaya string kernel (CONFIG_LOCALVERSION dkk) tetap identik dengan BaikalOS asli.
  DEFCONFIG_NAME: mi845_defconfig
  # Lokasi defconfig asli di dalam kernel source (relatif ke arch/arm64/configs)
  DEFCONFIG_SUBPATH: vendor/xiaomi/mi845_defconfig

  # Defconfig hasil extract-ikconfig dari boot.img BaikalOS (lihat README.md).
  # Inilah defconfig yang benar-benar dipakai untuk compile.
  EXTRACTED_DEFCONFIG: extracted-config/bos13_defconfig

  ARCH: arm64
  SUBARCH: arm64

  # ==== Identitas build ====
  KBUILD_BUILD_USER: "Nerf."
  KBUILD_BUILD_HOST: "OldlineSSS"

  # ==== Toolchain ====
  CLANG_VERSION: r487747c
  # Kalau kamu sudah punya mirror clang-r487747c.tar.gz sendiri (rilis GitHub / storage lain),
  # isi lewat repo variable CLANG_URL supaya tidak perlu clone AOSP yang berat.
  # Contoh: https://github.com/<user>/clang-prebuilts/releases/download/r487747c/clang-r487747c.tar.gz
  CLANG_URL: ${{ https://github.com/tan2ardiansyah/compiler-nub/releases/download/clang-toolchain/clang-r487747c.tar.gz }}
  GCC64_URL: ${{ vars.GCC64_URL }}
  GCC32_URL: ${{ vars.GCC32_URL }}

  TOOLCHAIN_DIR: ${{ github.workspace }}/toolchain

  # ==== SUSFS ====
  SUSFS_REPO: https://gitlab.com/simonpunk/susfs4ksu.git
  SUSFS_PATCH_URL: https://raw.githubusercontent.com/JackA1ltman/NonGKI_Kernel_Build_2nd/mainline/Patches/Patch/susfs_patch_to_4.9.patch

  # ==== ReSukiSU ====
  RESUKISU_SETUP_URL: https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh

jobs:
  compile:
    runs-on: ubuntu-22.04
    steps:
      # -----------------------------------------------------------------
      # 0. Checkout repo build (berisi .github/workflows, extracted-config, README)
      # -----------------------------------------------------------------
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Set swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      # -----------------------------------------------------------------
      # 1. Install dependencies
      # -----------------------------------------------------------------
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ccache curl flex \
            g++-multilib gcc-multilib git gnupg gperf \
            lib32ncurses5-dev lib32readline-dev lib32z1-dev \
            liblz4-tool libncurses-dev libssl-dev libxml2-utils \
            lzop pngcrush rsync schedtool squashfs-tools xsltproc \
            zip zlib1g-dev libc6-dev-i386 python3 python-is-python3 \
            device-tree-compiler cpio kmod unzip

      # -----------------------------------------------------------------
      # 2. Cache & siapkan toolchain (Clang r487747c + GCC32/GCC64)
      # -----------------------------------------------------------------
      - name: Cache toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: ${{ env.TOOLCHAIN_DIR }}
          key: toolchain-${{ env.CLANG_VERSION }}-gcc32-gcc64-v1

      - name: Download Clang ${{ env.CLANG_VERSION }}
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$TOOLCHAIN_DIR/clang"
          if [ -n "$CLANG_URL" ]; then
            echo "==> Pakai mirror custom: $CLANG_URL"
            curl -L --retry 3 -o clang.tar.gz "$CLANG_URL"
            tar -xf clang.tar.gz -C "$TOOLCHAIN_DIR/clang"
            rm -f clang.tar.gz
          else
            echo "==> CLANG_URL tidak diisi, clone langsung dari AOSP (lebih lambat)."
            echo "    Disarankan set repo variable CLANG_URL ke clang-r487747c.tar.gz kamu sendiri."
            git clone --depth=1 -b clang-${CLANG_VERSION}-release \
              https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
              "$TOOLCHAIN_DIR/clang"
          fi

      - name: Download GCC64 (aarch64-linux-android-4.9)
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$TOOLCHAIN_DIR/gcc64"
          if [ -n "$GCC64_URL" ]; then
            curl -L --retry 3 -o gcc64.tar.gz "$GCC64_URL"
            tar -xf gcc64.tar.gz -C "$TOOLCHAIN_DIR/gcc64"
            rm -f gcc64.tar.gz
          else
            git clone --depth=1 -b android-11.0.0_r48 \
              https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 \
              "$TOOLCHAIN_DIR/gcc64"
          fi

      - name: Download GCC32 (arm-linux-androideabi-4.9)
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$TOOLCHAIN_DIR/gcc32"
          if [ -n "$GCC32_URL" ]; then
            curl -L --retry 3 -o gcc32.tar.gz "$GCC32_URL"
            tar -xf gcc32.tar.gz -C "$TOOLCHAIN_DIR/gcc32"
            rm -f gcc32.tar.gz
          else
            git clone --depth=1 -b android-11.0.0_r48 \
              https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 \
              "$TOOLCHAIN_DIR/gcc32"
          fi

      - name: Export toolchain PATH
        run: |
          CLANG_BIN=$(find "$TOOLCHAIN_DIR/clang" -maxdepth 3 -type d -name bin | head -n1)
          GCC64_BIN=$(find "$TOOLCHAIN_DIR/gcc64" -maxdepth 3 -type d -name bin | head -n1)
          GCC32_BIN=$(find "$TOOLCHAIN_DIR/gcc32" -maxdepth 3 -type d -name bin | head -n1)
          echo "CLANG_BIN=$CLANG_BIN" >> "$GITHUB_ENV"
          echo "GCC64_BIN=$GCC64_BIN" >> "$GITHUB_ENV"
          echo "GCC32_BIN=$GCC32_BIN" >> "$GITHUB_ENV"
          echo "$CLANG_BIN" >> "$GITHUB_PATH"
          echo "$GCC64_BIN" >> "$GITHUB_PATH"
          echo "$GCC32_BIN" >> "$GITHUB_PATH"

      # -----------------------------------------------------------------
      # 3. Clone kernel source BaikalOS
      # -----------------------------------------------------------------
      - name: Clone kernel source
        run: |
          git clone --depth=1 -b "${{ inputs.kernel_branch }}" "$KERNEL_REPO" "$KERNEL_DIR"

      # -----------------------------------------------------------------
      # 4. Pasang defconfig hasil extract-ikconfig, TANPA mengubah nama file asli
      # -----------------------------------------------------------------
      - name: Terapkan bos13_defconfig ke defconfig asli
        run: |
          set -e
          ORIG_PATH=$(find "$KERNEL_DIR/arch/arm64/configs" -iname "$DEFCONFIG_NAME" | head -n1)
          if [ -z "$ORIG_PATH" ]; then
            echo "::error::Defconfig asli '$DEFCONFIG_NAME' tidak ditemukan di kernel source!"
            exit 1
          fi
          echo "Defconfig asli ditemukan di: $ORIG_PATH"
          echo "ORIG_DEFCONFIG_PATH=$ORIG_PATH" >> "$GITHUB_ENV"

          if [ ! -f "$EXTRACTED_DEFCONFIG" ]; then
            echo "::error::$EXTRACTED_DEFCONFIG tidak ditemukan di repo ini."
            exit 1
          fi

          # Timpa isi defconfig asli dengan hasil extract-ikconfig, nama file & path TETAP sama
          cp "$EXTRACTED_DEFCONFIG" "$ORIG_PATH"
          echo "bos13_defconfig berhasil dipasang ke $ORIG_PATH"

      # -----------------------------------------------------------------
      # 5. Integrasi ReSukiSU
      # -----------------------------------------------------------------
      - name: Integrasikan ReSukiSU ke kernel source
        working-directory: ${{ env.KERNEL_DIR }}
        run: |
          set -e
          if [ -n "${{ inputs.resukisu_ref }}" ]; then
            curl -LSs "$RESUKISU_SETUP_URL" | bash -s "${{ inputs.resukisu_ref }}"
          else
            curl -LSs "$RESUKISU_SETUP_URL" | bash -s main
          fi

      # -----------------------------------------------------------------
      # 6. Terapkan patch SUSFS 2.2.0 + fallback kalau gagal patch
      # -----------------------------------------------------------------
      - name: Ambil source SUSFS (fs/ & include/)
        run: |
          set -e
          git clone --depth=1 -b "${{ inputs.susfs_branch }}" "$SUSFS_REPO" susfs4ksu
          cp -v susfs4ksu/kernel_patches/fs/*.c "$KERNEL_DIR/fs/" 2>/dev/null || true
          cp -v susfs4ksu/kernel_patches/include/linux/*.h "$KERNEL_DIR/include/linux/" 2>/dev/null || true

      - name: Download patch SUSFS untuk kernel 4.9
        run: |
          curl -LSs -o susfs_patch_to_4.9.patch "$SUSFS_PATCH_URL"

      - name: Terapkan patch SUSFS (dengan fallback jika gagal)
        working-directory: ${{ env.KERNEL_DIR }}
        run: |
          set +e
          echo "==> Percobaan 1: git apply (strict)"
          git apply --check ../susfs_patch_to_4.9.patch 2>err1.log
          if [ $? -eq 0 ]; then
            git apply ../susfs_patch_to_4.9.patch
            echo "Patch berhasil diterapkan (strict)."
            exit 0
          fi
          cat err1.log

          echo "==> Percobaan 2: git apply dengan 3-way merge"
          git apply -3 ../susfs_patch_to_4.9.patch 2>err2.log
          if [ $? -eq 0 ]; then
            echo "Patch berhasil diterapkan (3-way merge)."
            exit 0
          fi
          cat err2.log

          echo "==> Percobaan 3: patch klasik dengan fuzz, izinkan reject file"
          patch -p1 --fuzz=3 --no-backup-if-mismatch < ../susfs_patch_to_4.9.patch > patch3.log 2>&1
          RESULT=$?
          cat patch3.log

          REJECTS=$(find . -name "*.rej" 2>/dev/null)
          if [ -n "$REJECTS" ]; then
            echo "::warning::Sebagian hunk GAGAL diterapkan otomatis, cek file .rej berikut:"
            echo "$REJECTS"
            for f in $REJECTS; do
              echo "----- $f -----"
              cat "$f"
            done
            echo "::error::Patch SUSFS tidak sepenuhnya berhasil. Perbaiki manual hunk di atas,"
            echo "::error::commit hasil perbaikannya ke fork kernel kamu, lalu jalankan ulang workflow ini."
            echo "::error::(Fuzz/3-way sudah dicoba otomatis; sisanya butuh review manual"
            echo "::error:: karena source kernel BaikalOS bisa saja sudah berbeda dari basis patch.)"
            exit 1
          fi

          if [ $RESULT -ne 0 ]; then
            echo "::error::Patch gagal total tanpa reject file yang jelas. Cek patch3.log di atas."
            exit 1
          fi

          echo "Patch berhasil diterapkan (fuzzy, tanpa reject)."

      # -----------------------------------------------------------------
      # 7. Aktifkan opsi KernelSU + SUSFS di defconfig
      # -----------------------------------------------------------------
      - name: Aktifkan CONFIG_KSU & CONFIG_KSU_SUSFS di defconfig
        working-directory: ${{ env.KERNEL_DIR }}
        run: |
          set -e
          CFG="$ORIG_DEFCONFIG_PATH"
          SCRIPTS_CONFIG=scripts/config
          if [ ! -x "$SCRIPTS_CONFIG" ]; then
            chmod +x "$SCRIPTS_CONFIG"
          fi

          "$SCRIPTS_CONFIG" --file "$CFG" \
            --enable CONFIG_KSU \
            --enable CONFIG_KSU_MANUAL_HOOK \
            --enable CONFIG_KSU_SUSFS \
            --enable CONFIG_KSU_SUSFS_SUS_PATH \
            --enable CONFIG_KSU_SUSFS_SUS_MOUNT \
            --enable CONFIG_KSU_SUSFS_SUS_KSTAT \
            --enable CONFIG_KSU_SUSFS_SUS_OVERLAYFS \
            --enable CONFIG_KSU_SUSFS_TRY_UMOUNT \
            --enable CONFIG_KSU_SUSFS_SPOOF_UNAME \
            --enable CONFIG_KSU_SUSFS_SPOOF_PROC_CMDLINE \
            --enable CONFIG_KSU_SUSFS_ENABLE_LOG \
            --enable CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS \
            --enable CONFIG_KALLSYMS \
            --enable CONFIG_KALLSYMS_ALL

          # NB: nama-nama CONFIG_KSU_SUSFS_* bisa berubah antar versi susfs.
          # Kalau build gagal karena opsi tidak dikenal, cek Kconfig hasil patch
          # di drivers/kernelsu/Kconfig lalu sesuaikan daftar di atas.

          echo "----- Cuplikan opsi KSU/SUSFS pada $CFG -----"
          grep -E "CONFIG_KSU" "$CFG" || true

      # -----------------------------------------------------------------
      # 8. Build kernel
      # -----------------------------------------------------------------
      - name: mrproper (opsional)
        if: ${{ inputs.clean_build == 'true' }}
        working-directory: ${{ env.KERNEL_DIR }}
        run: make ARCH=$ARCH O=out mrproper

      - name: Generate .config dari defconfig asli
        working-directory: ${{ env.KERNEL_DIR }}
        run: |
          make -j$(nproc --all) O=out ARCH=$ARCH SUBARCH=$SUBARCH \
            CC=clang \
            "$DEFCONFIG_SUBPATH"
          make -j$(nproc --all) O=out ARCH=$ARCH CC=clang olddefconfig

      - name: Build kernel Image + dtbo
        working-directory: ${{ env.KERNEL_DIR }}
        run: |
          set -o pipefail
          make -j$(nproc --all) O=out \
            ARCH=$ARCH \
            SUBARCH=$SUBARCH \
            CC="clang" \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            KBUILD_BUILD_USER="$KBUILD_BUILD_USER" \
            KBUILD_BUILD_HOST="$KBUILD_BUILD_HOST" \
            2>&1 | tee ../build.log

      - name: Cek hasil build
        working-directory: ${{ env.KERNEL_DIR }}
        run: |
          set -e
          IMAGE=$(find out/arch/arm64/boot -maxdepth 1 -name "Image.gz-dtb" -o -name "Image" | head -n1)
          if [ -z "$IMAGE" ]; then
            echo "::error::Tidak ditemukan Image/Image.gz-dtb hasil build. Cek build.log."
            exit 1
          fi
          echo "IMAGE_PATH=$IMAGE" >> "$GITHUB_ENV"
          echo "Kernel image: $IMAGE"

      # -----------------------------------------------------------------
      # 9. Upload artifact hasil compile
      # -----------------------------------------------------------------
      - name: Upload kernel image
        uses: actions/upload-artifact@v4
        with:
          name: kernel-image
          path: |
            ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image.gz-dtb
            ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image
            ${{ env.KERNEL_DIR }}/out/arch/arm64/boot/dtbo.img
          if-no-files-found: warn

      - name: Upload .config & build log (buat debug)
        uses: actions/upload-artifact@v4
        with:
          name: build-debug
          path: |
            ${{ env.KERNEL_DIR }}/out/.config
            build.log
          if-no-files-found: warn

  package:
    needs: compile
    uses: ./.github/workflows/build-flashable-zip-test.yml
    with:
      artifact_name: kernel-image
    secrets: inherit
