name: 2. Build Flashable ZIP - AnyKernel3 (BOS Beryllium + ReSukiSU + SUSFS)

on:
  workflow_dispatch:
    inputs:
      compile_run_id:
        description: 'Run ID workflow "1. Compile Kernel" yang sukses (lihat di URL halaman run, angka setelah /runs/)'
        required: true
      compile_artifact_prefix:
        description: 'Nilai "Nama Build" (zip_name) yang dipakai SAAT MENJALANKAN workflow 1 kemarin'
        required: true
        default: 'bos-beryllium-resukisu'
      zip_name:
        description: 'Nama Build untuk ZIP hasil keluaran workflow ini'
        required: true
        default: 'bos-beryllium-resukisu-susfs'
      kernel_string:
        description: 'kernel.string yang ditampilkan di AnyKernel3 (info build)'
        required: false
        default: 'BOS Beryllium ReSukiSU + SUSFS 2.2.0 Kernel'
      manager_apk_source:
        description: 'Repo sumber manager APK ReSukiSU (URL rilis akan disusun otomatis dari ksu_tag hasil compile)'
        required: true
        default: 'https://github.com/ReSukiSU/ReSukiSU'
        type: choice
        options:
          - 'https://github.com/ReSukiSU/ReSukiSU'
          - 'https://github.com/KernelSU-Next/KernelSU-Next'
          - 'https://github.com/ThRE-Team/KernelSU-Next'

permissions:
  actions: read
  contents: read

jobs:
  build-flashable-zip:
    name: ${{ github.event.inputs.zip_name }}-flashable
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ================================================================
      # 1. Download artifact Image.gz-dtb dari workflow compile
      # ================================================================
      - name: Download artifact Image.gz-dtb dari run workflow 1
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.event.inputs.compile_artifact_prefix }}-gz-dtb
          run-id: ${{ github.event.inputs.compile_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: downloaded-artifact

      # ================================================================
      # 2. Download build metadata (optional)
      # ================================================================
      - name: Download artifact build-metadata dari run workflow 1 (opsional)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: build-metadata
          run-id: ${{ github.event.inputs.compile_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: downloaded-metadata

      # ================================================================
      # 3. Susun file di root
      # ================================================================
      - name: Susun Image.gz-dtb & build-metadata.json di root workspace
        run: |
          echo "== Isi downloaded-artifact =="
          find downloaded-artifact -type f -exec ls -lh {} \;

          find downloaded-artifact -iname "Image.gz-dtb" -exec cp {} Image.gz-dtb \;
          if [ ! -f Image.gz-dtb ]; then
            echo "ERROR: Image.gz-dtb tidak ditemukan di artifact yang diunduh."
            find downloaded-artifact -type f
            exit 1
          fi
          echo "== Image.gz-dtb ditemukan =="
          file Image.gz-dtb
          ls -la Image.gz-dtb

          if [ -f downloaded-metadata/build-metadata.json ]; then
            cp downloaded-metadata/build-metadata.json build-metadata.json
            echo "== build-metadata.json ditemukan =="
            cat build-metadata.json
          else
            echo "[INFO] build-metadata.json tidak ditemukan. Changelog akan minimal."
          fi

      # ================================================================
      # 4. Verify Manager APK URL
      # ================================================================
      - name: Susun & Verifikasi URL Manager APK
        run: |
          if [ -f "build-metadata.json" ]; then
            KSU_TAG=$(python3 -c "import json; print(json.load(open('build-metadata.json')).get('ksu_tag','unknown'))")
          else
            KSU_TAG="unknown"
          fi

          MANAGER_SOURCE="${{ github.event.inputs.manager_apk_source }}"
          echo "KSU_TAG: $KSU_TAG"
          echo "Manager source: $MANAGER_SOURCE"

          if [ "$KSU_TAG" = "unknown" ] || [ "$KSU_TAG" = "main" ]; then
            MANAGER_RELEASE_URL="${MANAGER_SOURCE}/releases"
            MANAGER_STATUS="[INFO] KSU_TAG tidak spesifik (main/unknown). Menautkan ke halaman releases umum."
          else
            MANAGER_RELEASE_URL="${MANAGER_SOURCE}/releases/tag/${KSU_TAG}"
            HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}" -L "$MANAGER_RELEASE_URL")
            echo "HTTP status: $HTTP_STATUS"
            if [ "$HTTP_STATUS" = "200" ]; then
              MANAGER_STATUS="[OK] Rilis manager APK untuk tag ${KSU_TAG} ditemukan."
            else
              MANAGER_STATUS="[WARN] Tag ${KSU_TAG} tidak ditemukan di ${MANAGER_SOURCE} (HTTP ${HTTP_STATUS}). Fallback ke halaman releases umum."
              MANAGER_RELEASE_URL="${MANAGER_SOURCE}/releases"
            fi
          fi

          echo "MANAGER_RELEASE_URL=$MANAGER_RELEASE_URL" >> "$GITHUB_ENV"
          echo "MANAGER_STATUS=$MANAGER_STATUS" >> "$GITHUB_ENV"
          echo "$MANAGER_STATUS"

      # ================================================================
      # 5. Build AnyKernel3 (patch presisi dari template upstream)
      # ================================================================
      - name: Build AnyKernel3 Flashable ZIP
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ak3-build
          cd ak3-build

          # Hapus contoh ramdisk device referensi (maguro/tuna)
          rm -rf ramdisk patch vendor_ramdisk vendor_patch README.md version .git .github 2>/dev/null || true

          python3 << 'PYEOF'
          import re
          import os

          with open("anykernel.sh", "r") as f:
              content = f.read()

          kernel_string = os.environ.get("KERNEL_STRING_ENV", "BOS Beryllium ReSukiSU + SUSFS Kernel")

          # 1) Ganti blok properties() dengan properti beryllium
          new_properties = f"""properties() {{ '
          kernel.string={kernel_string}
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=beryllium
          device.name2=PocophoneF1
          device.name3=PocoF1
          device.name4=
          device.name5=
          supported.versions=
          supported.patchlevels=
          supported.vendorpatchlevels=
          '; }} # end properties"""

          content, n = re.subn(
              r"properties\(\)\s*\{.*?\}\s*#\s*end properties",
              new_properties,
              content,
              count=1,
              flags=re.DOTALL,
          )
          print(f"[INFO] Blok properties() diganti: {n} kali")

          # 2) Hapus blok contoh ramdisk Galaxy Nexus (init.tuna.rc, fstab.tuna)
          tuna_block_pattern = re.compile(
              r"# init\.rc\n.*?append_file fstab\.tuna \"usbdisk\" fstab;\n\n",
              re.DOTALL,
          )
          content, n2 = tuna_block_pattern.subn("", content)
          print(f"[INFO] Blok contoh ramdisk Galaxy Nexus dihapus: {n2} kali")

          # 3) Ganti BLOCK= dari OMAP (Galaxy Nexus) ke SDM845 standard path
          content, n3 = re.subn(
              r"BLOCK=/dev/block/platform/omap/omap_hsmmc\.0/by-name/boot;",
              "BLOCK=/dev/block/bootdevice/by-name/boot;",
              content,
              count=1,
          )
          print(f"[INFO] BLOCK= diganti: {n3} kali")

          if n == 0:
              print("[WARN] Pattern properties() tidak match! Cek format upstream terbaru.")
          if n3 == 0:
              print("[WARN] BLOCK= OMAP tidak match. Mungkin upstream ubah format.")

          with open("anykernel.sh", "w") as f:
              f.write(content)
          PYEOF
        env:
          KERNEL_STRING_ENV: ${{ github.event.inputs.kernel_string }}

      # ================================================================
      # 6. Show final anykernel.sh
      # ================================================================
      - name: Tampilkan anykernel.sh setelah patch
        run: |
          cd ak3-build
          echo "== anykernel.sh setelah patch =="
          cat anykernel.sh

      # ================================================================
      # 7. Prepare AnyKernel3 folder (siap zip)
      # ================================================================
      - name: Prepare folder AnyKernel3
        run: |
          cp Image.gz-dtb ak3-build/

          ARTIFACT_NAME="${{ github.event.inputs.zip_name }}-$(date -u +%Y%m%d-%H%M)"
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> "$GITHUB_ENV"

          echo "== Isi ak3-build =="
          ls -la ak3-build/
          echo ""
          echo "Artifact name: $ARTIFACT_NAME"
          echo "Setelah download: ${ARTIFACT_NAME}.zip"

      # ================================================================
      # 8. Generate Changelog (dengan bug fix ${ZIP_FILENAME} → ${ARTIFACT_NAME}.zip)
      # ================================================================
      - name: Generate Changelog Otomatis
        run: |
          if [ -f "build-metadata.json" ]; then
            KERNEL_SOURCE=$(python3 -c "import json; print(json.load(open('build-metadata.json')).get('kernel_source','unknown'))")
            KERNEL_BRANCH=$(python3 -c "import json; print(json.load(open('build-metadata.json')).get('kernel_branch','unknown'))")
            KERNEL_COMMIT=$(python3 -c "import json; print(json.load(open('build-metadata.json')).get('kernel_commit','unknown'))")
            KSU_TAG=$(python3 -c "import json; print(json.load(open('build-metadata.json')).get('ksu_tag','unknown'))")
            KSU_COMMIT=$(python3 -c "import json; print(json.load(open('build-metadata.json')).get('ksu_commit','unknown'))")
            KERNEL_VERSION_STRING=$(python3 -c "import json; print(json.load(open('build-metadata.json')).get('kernel_version_string','unknown'))")
            CLANG_URL=$(python3 -c "import json; print(json.load(open('build-metadata.json')).get('clang_url','unknown'))")
            BUILD_DATE_SRC=$(python3 -c "import json; print(json.load(open('build-metadata.json')).get('build_date','unknown'))")
          else
            KERNEL_SOURCE="unknown (build-metadata.json tidak ditemukan)"
            KERNEL_BRANCH="unknown"
            KERNEL_COMMIT="unknown"
            KSU_TAG="unknown"
            KSU_COMMIT="unknown"
            KERNEL_VERSION_STRING="unknown"
            CLANG_URL="unknown"
            BUILD_DATE_SRC="unknown"
          fi

          ZIP_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          ZIP_FILENAME="${ARTIFACT_NAME}.zip"

          cat > CHANGELOG.md << EOF
          # Changelog — BOS Beryllium + ReSukiSU + SUSFS (Flashable ZIP)

          **Tanggal compile kernel:** ${BUILD_DATE_SRC}
          **Tanggal pembuatan ZIP ini:** ${ZIP_DATE}

          ## Sumber
          | Komponen | Nilai |
          |---|---|
          | Kernel source | ${KERNEL_SOURCE} |
          | Kernel branch | ${KERNEL_BRANCH} |
          | Kernel commit | \`${KERNEL_COMMIT}\` |
          | ReSukiSU tag | ${KSU_TAG} |
          | ReSukiSU commit | \`${KSU_COMMIT}\` |
          | Kernel release string | \`${KERNEL_VERSION_STRING}\` |
          | Clang | ${CLANG_URL} |
          | AnyKernel3 | Template resmi terbaru dari osm0sis/AnyKernel3 |
          | Image.gz-dtb sumber | Run ID workflow compile #${{ github.event.inputs.compile_run_id }} (${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.inputs.compile_run_id }}) |

          ## Manager APK
          ${MANAGER_STATUS}

          Unduh manager APK yang sesuai versi kernel ini di:
          ${MANAGER_RELEASE_URL}

          Pastikan build number manager APK sama/lebih tinggi dari minimum yang disyaratkan rilis tersebut, dan **jangan campur** manager dari tag berbeda dengan kernel yang sedang dipakai.

          ## File
          - \`${ZIP_FILENAME}\` — flashable ZIP (AnyKernel3), siap di-flash lewat TWRP/recovery

          ## Cara Pasang
          1. Reboot ke recovery (TWRP atau yang sejenis)
          2. Flash \`${ZIP_FILENAME}\`
          3. Reboot ke sistem
          4. Install APK manager ReSukiSU versi yang sesuai (lihat tautan di atas)
          5. Buka app, pastikan status kernel terdeteksi aktif
          EOF

          echo "== CHANGELOG.md =="
          cat CHANGELOG.md

      # ================================================================
      # 9. Upload Flashable ZIP
      # ================================================================
      - name: Upload Flashable ZIP (auto-zip GitHub)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ak3-build/**
          retention-days: 30
          if-no-files-found: error

      # ================================================================
      # 10. Upload Changelog
      # ================================================================
      - name: Upload Changelog
        uses: actions/upload-artifact@v4
        with:
          name: CHANGELOG-${{ env.ARTIFACT_NAME }}
          path: CHANGELOG.md
          if-no-files-found: warn
          retention-days: 30

      # ================================================================
      # 11. Job Summary
      # ================================================================
      - name: Job summary
        if: always()
        run: |
          echo "## 📦 Flashable ZIP Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact Name | ${{ env.ARTIFACT_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Source Compile Run | #${{ github.event.inputs.compile_run_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Manager APK URL | ${{ env.MANAGER_RELEASE_URL }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Manager Status | ${{ env.MANAGER_STATUS }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Download" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Scroll ke bagian **Artifacts** di run summary" >> $GITHUB_STEP_SUMMARY
          echo "2. Download \`${{ env.ARTIFACT_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "3. File SUDAH FLASHABLE — langsung flash via TWRP" >> $GITHUB_STEP_SUMMARY
